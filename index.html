<style>
*{-webkit-tap-highlight-color:transparent;user-select:none;box-sizing:border-box;}
body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100vw;overflow:hidden;font-family:'Lexend',sans-serif;}
.watch-frame{width:100vw;height:100vh;background:#0e0e0e;position:relative;overflow:hidden;display:flex;flex-direction:column;}
@media(max-width:320px){.watch-frame{border-radius:2rem;}}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.material-symbols-outlined.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
.pulse-glow{box-shadow:0 0 20px rgba(0,253,135,0.4);}
.scale-press:active{transform:scale(0.94);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.animate-pulse-slow{animation:pulse 2s ease infinite;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp 0.25s ease forwards;}
@keyframes scoreFlash{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.score-flash{animation:scoreFlash 0.3s ease;}
.mic-active{animation:pulse 0.8s ease infinite;box-shadow:0 0 20px rgba(255,113,108,0.5);}
.scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scrollable::-webkit-scrollbar{display:none;}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:#262626;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#00fd87;border-radius:50%;cursor:pointer;}
input[type=text]{-webkit-user-select:text;user-select:text;}
.countdown-ring{transform:rotate(-90deg);transform-origin:50% 50%;}
@keyframes timerWarn{0%,100%{opacity:1}50%{opacity:0.3}}
.timer-warn{animation:timerWarn 0.5s ease infinite;}
@keyframes splashFadeIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes splashFadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.05)}}
.splash-in{animation:splashFadeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;}
.splash-out{animation:splashFadeOut 0.4s ease forwards;}
@keyframes splashPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,253,135,0.4)}70%{box-shadow:0 0 0 20px rgba(0,253,135,0)}}
.splash-glow{animation:splashPulse 1.5s ease infinite;}
@keyframes dotAppear{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

let SPECTATOR = false; // modo solo lectura si viene de URL compartida

function loadState(){
    // 1. Intentar cargar desde URL (modo espectador)
    try{
        const hash = window.location.hash.slice(1);
        if(hash.startsWith('pp=')){
            const decoded = JSON.parse(decodeURIComponent(atob(hash.slice(3))));
            SPECTATOR = true;
            decoded.voiceActive = false;
            decoded.timerRunning = false;
            return decoded;
        }
    }catch(e){}
    // 2. Cargar desde localStorage
    try{ const s=localStorage.getItem('pp_state_v3'); if(s) return JSON.parse(s); }catch(e){}
    return defaultState();
}

// Set default team names from current language (called after LANGS is defined)
function initTeamNames(){
    if(!S.teamA.name) S.teamA.name = i('teamA').toUpperCase();
    if(!S.teamB.name) S.teamB.name = i('teamB').toUpperCase();
}
function saveState(){ try{ localStorage.setItem('pp_state_v3',JSON.stringify(S)); }catch(e){} }

// Helper — get translation
function i(key, vars={}){
    const lang = S.lang||'es';
    const t = (LANGS[lang]||LANGS.es).t;
    let str = t[key] || LANGS.es.t[key] || key;
    Object.entries(vars).forEach(([k,v])=>{ str = str.replace('%'+k, v); });
    return str;
}
function currentLang(){ return LANGS[S.lang||'es']||LANGS.es; }
function setLang(code){
    const oldLang = S.lang||'es';
    // If team names are still the default, auto-translate them
    const oldA = (LANGS[oldLang]||LANGS.es).t.teamA.toUpperCase();
    const oldB = (LANGS[oldLang]||LANGS.es).t.teamB.toUpperCase();
    S.lang = code;
    if(!S.teamA.name || S.teamA.name===oldA) S.teamA.name = i('teamA').toUpperCase();
    if(!S.teamB.name || S.teamB.name===oldB) S.teamB.name = i('teamB').toUpperCase();
    if(recognition){ stopVoice(); }

function startBetweenTimer(max=20){

function renderBetweenTimer(){

function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function beep(f=880,d=0.08,t='sine',v=0.2){
    if(!S.soundEnabled) return;
    const c=getAudio(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.start();o.stop(c.currentTime+d);
}
function soundPoint(){ beep(660,0.07);setTimeout(()=>beep(880,0.07),80); }
function soundGame(){ [440,550,660,770].forEach((f,i)=>setTimeout(()=>beep(f,0.12),i*75)); }
function soundSet(){ [330,440,550,660,880,1100].forEach((f,i)=>setTimeout(()=>beep(f,0.15),i*80)); }
function soundMatch(){ [330,440,550,660,440,660,880].forEach((f,i)=>setTimeout(()=>beep(f,0.2),i*100)); }
function soundDeuce(){ beep(440,0.15,'square',0.1);setTimeout(()=>beep(440,0.15,'square',0.1),200); }
function soundUndo(){ beep(300,0.1); }
function soundWarning(){ beep(220,0.3,'sawtooth',0.15); }
function soundTiebreak(){ [880,660,880,1100].forEach((f,i)=>setTimeout(()=>beep(f,0.1),i*100)); }

        };
    }

        if(S.advantage==='A') return {scoreA:'AD',scoreB:'40',label:i('advantage')+' '+S.teamA.name,isDeuce:true};
        if(S.advantage==='B') return {scoreA:'40',scoreB:'AD',label:i('advantage')+' '+S.teamB.name,isDeuce:true};

    }

// LÓGICA COMPLETA
// ═══════════════════════════════════════════
function snapshot(){
    S.history.push(JSON.parse(JSON.stringify({
        teamA:S.teamA, teamB:S.teamB, setsHistory:S.setsHistory,
        currentSet:S.currentSet, serving:S.serving, deuce:S.deuce,
        advantage:S.advantage, tiebreak:S.tiebreak, tiebreakPoints:{...S.tiebreakPoints},
        tiebreakServing:S.tiebreakServing, tiebreakServCount:S.tiebreakServCount,
        matchOver:S.matchOver, matchWinner:S.matchWinner, faults:JSON.parse(JSON.stringify(S.faults))
    })));
    if(S.history.length>50) S.history.shift();
}

function addPoint(team){
    if(S.matchOver) return;
    snapshot();
    flashScore(team);
    S.momentum.push({team, time:S.gameTime, set:S.currentSet, game:S.teamA.games+S.teamB.games});
    if(S.momentum.length>200) S.momentum.shift();

    // TIEBREAK
    if(S.tiebreak){ addTiebreakPoint(team); return; }

    // SUPERDESEMPATE (tercer set a 10)
    if(S.superTiebreak){ addSuperTiebreakPoint(team); return; }

    const other=team==='A'?'B':'A';

    // DEUCE / VENTAJA / PUNTO ORO
    if(S.deuce){
        if(S.goldenPoint){ winGame(team); return; }
        if(S.advantage===null){ S.advantage=team; soundPoint(); render(); saveState(); return; }
        if(S.advantage===team){ winGame(team); return; }
        else{ S.advantage=null; soundDeuce(); logActivity('deuce',null); render(); saveState(); return; }
    }

    S['team'+team].points++;
    const pts=S['team'+team].points, ptsOther=S['team'+other].points;

    if(pts>=3&&ptsOther>=3){ S.deuce=true; S.advantage=null; soundDeuce(); logActivity('deuce',null); render(); saveState(); return; }
    if(pts>=4){ winGame(team); return; }
    soundPoint(); render(); saveState();
}

function addTiebreakPoint(team){
    S.tiebreakPoints[team]++;
    S.tiebreakServCount++;
    // Saque: primero 1 punto, luego cada 2
    if(S.tiebreakServCount===1 || S.tiebreakServCount>1 && S.tiebreakServCount%2===1){
        S.tiebreakServing=S.tiebreakServing==='A'?'B':'A';
    }
    const pA=S.tiebreakPoints.A, pB=S.tiebreakPoints.B;
    // Ganar: 7+ con diferencia 2
    if((pA>=7||pB>=7)&&Math.abs(pA-pB)>=2){
        const w=pA>pB?'A':'B';
        winSet(w,S.teamA.games,S.teamB.games,true);
    } else {
        soundPoint(); render(); saveState();
        // Cambio de lado cada 6 puntos totales
        if((pA+pB)%6===0) showToast(i('sideChange'),2000);
    }
}

function addSuperTiebreakPoint(team){
    S.tiebreakPoints[team]++;
    S.tiebreakServCount++;
    if(S.tiebreakServCount===1||S.tiebreakServCount>1&&S.tiebreakServCount%2===1){
        S.tiebreakServing=S.tiebreakServing==='A'?'B':'A';
    }
    const pA=S.tiebreakPoints.A,pB=S.tiebreakPoints.B;
    if((pA>=10||pB>=10)&&Math.abs(pA-pB)>=2){
        const w=pA>pB?'A':'B';
        winSet(w,pA,pB,true);
    } else { soundPoint(); render(); saveState(); }
}

function winGame(team){
    soundGame();
    S['team'+team].games++;
    S.teamA.points=0; S.teamB.points=0;
    S.deuce=false; S.advantage=null;
    S.serving=S.serving==='A'?'B':'A';
    logActivity('game',team);
    // Estimar calorías
    S.calories=Math.round(S.gameTime/60*7.5);

    const gA=S.teamA.games, gB=S.teamB.games;
    let setWinner=null;

    // Tie-break a 6-6
    if(gA===6&&gB===6&&!S.superTiebreak){
        // Activar tie-break
        S.tiebreak=true;
        S.tiebreakPoints={A:0,B:0};
        S.tiebreakServing=S.serving;
        S.tiebreakServCount=0;
        soundTiebreak();
        showToast(i('tiebreakAlert'),3000);
        render(); saveState(); return;
    }
    if(gA>=6&&gA-gB>=2) setWinner='A';
    else if(gB>=6&&gB-gA>=2) setWinner='B';

    if(setWinner){ winSet(setWinner,gA,gB,false); }
    else{ render(); saveState(); }
    showBetweenTimerEl(20); startBetweenTimer(20);
}

function winSet(team,gA,gB,fromTiebreak){
    soundSet();
    S['team'+team].sets++;
    S.setsHistory.push({a:gA,b:gB,winner:team,tiebreak:fromTiebreak||S.tiebreak||S.superTiebreak});
    S.teamA.games=0; S.teamB.games=0;
    S.tiebreak=false; S.superTiebreak=false;
    S.tiebreakPoints={A:0,B:0};
    S.currentSet++;
    logActivity('set',team);

    const setsA=S.setsHistory.filter(s=>s.winner==='A').length;
    const setsB=S.setsHistory.filter(s=>s.winner==='B').length;

    // Ganar partido (mejor de 3)
    if(setsA>=2||setsB>=2){
        S.matchOver=true; S.matchWinner=team; S.timerRunning=false;
        soundMatch(); logActivity('match',team);
        saveState(); render();
        setTimeout(()=>showMatchOver(team),400); return;
    }

    // Tercer set: opción superdesempate
    if(S.currentSet===3&&S.goldenPoint){
        // Activar superdesempate directamente
        S.superTiebreak=true; S.tiebreak=true;
        S.tiebreakPoints={A:0,B:0}; S.tiebreakServing=S.serving;
        showToast(i('superAlert'),3000);
    }

    render(); saveState();
    showToast(i('setWon',{T:S['team'+team].name,A:gA,B:gB}),3000);
    showBetweenTimerEl(90); startBetweenTimer(90);
}

function removePoint(team){
    if(S.matchOver) return;
    snapshot();
    const t=S['team'+team];
    if(S.tiebreak){
        if(S.tiebreakPoints[team]>0) S.tiebreakPoints[team]--;
        else{ showToast('No hay puntos que quitar'); S.history.pop(); return; }
    } else if(S.deuce){
        if(S.advantage===team) S.advantage=null;
        else{ S.deuce=false; t.points=3; S['team'+(team==='A'?'B':'A')].points=3; }
    } else {
        if(t.points>0) t.points--;
        else if(t.games>0){
            t.games--; t.points=0; S['team'+(team==='A'?'B':'A')].points=0;
            S.serving=S.serving==='A'?'B':'A';
            showToast('↩ '+t.name);
        } else { showToast('No hay puntos que quitar'); S.history.pop(); return; }
    }
    soundUndo(); render(); saveState(); showToast('➖ Punto retirado a '+t.name);
}

function undoPoint(){
    if(!S.history.length){ showToast('Nada que deshacer'); return; }
    const prev=S.history.pop(); Object.assign(S,prev);
    soundUndo(); render(); saveState(); showToast('↩ Punto deshecho');
}

function logActivity(type,team){
    S.activityLog.unshift({type,team,time:formatTime(S.gameTime),set:S.currentSet,score:{gA:S.teamA.games,gB:S.teamB.games}});
    if(S.activityLog.length>100) S.activityLog.pop();
}

function flashScore(team){
    setTimeout(()=>{ const el=document.getElementById('score-'+team); if(el){el.classList.add('score-flash');setTimeout(()=>el.classList.remove('score-flash'),300);} },10);

function addFault(team,type){
    snapshot();

    render(); saveState();
}

function getLiveUrl(){
    // Encoda el estado actual en la URL como hash
    const snapshot = {
        teamA: S.teamA, teamB: S.teamB,
        setsHistory: S.setsHistory, currentSet: S.currentSet,
        serving: S.serving, deuce: S.deuce, advantage: S.advantage,
        tiebreak: S.tiebreak, tiebreakPoints: S.tiebreakPoints,
        matchOver: S.matchOver, matchWinner: S.matchWinner,
        gameTime: S.gameTime, theme: S.theme||'neon',
        faults: S.faults, activityLog: S.activityLog.slice(0,20)
    };
    const encoded = btoa(encodeURIComponent(JSON.stringify(snapshot)));
    return window.location.origin + window.location.pathname + '#pp=' + encoded;
}

function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ showToast('⚠️ Voz no disponible'); return; }
    if(recognition){ stopVoice(); return; }
    recognition=new SR(); recognition.lang=currentLang().voice; recognition.continuous=true; recognition.interimResults=false; recognition.maxAlternatives=3;
    recognition.onresult=(e)=>{ for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) processVoiceCommand(e.results[i][0].transcript.toLowerCase().trim()); };
    recognition.onerror=(e)=>{ if(e.error!=='no-speech'){ showToast('Voz: '+e.error); stopVoice(); } };
    recognition.onend=()=>{ if(S.voiceActive) recognition.start(); };
    recognition.start(); S.voiceActive=true; render(); showToast('🎙️ Escuchando...',2000);
}
function stopVoice(){ if(recognition){ try{recognition.stop();}catch(e){} recognition=null; } S.voiceActive=false; render(); }
function toggleVoice(){ if(S.voiceActive) stopVoice(); else startVoice(); }

let GEMINI_KEY = localStorage.getItem('pp_gemini_key') || '';
let aiEnabled = true;
let chatHistory = [];

const REFEREE_SYSTEM = () => {
    const sc = getScoreDisplay();
    const nA = S.teamA.name, nB = S.teamB.name;
    const srv = S['team'+S.serving].name;
    const rstr = S['team'+(S.serving==='A'?'B':'A')].name;
    const sA = S.setsHistory.filter(s=>s.winner==='A').length;
    const sB = S.setsHistory.filter(s=>s.winner==='B').length;
    return `You are the official referee of a padel match. Respond ALWAYS in ${currentLang().name} (${S.lang||'es'}).
Tone: professional, concise, like a real padel referee on court.

MATCH STATE:
- Team A: ${nA} | Team B: ${nB}
- Points: ${sc.scoreA} - ${sc.scoreB}
- Games this set: ${nA} ${S.teamA.games} - ${S.teamB.games} ${nB}
- Sets: ${nA} ${sA} - ${sB} ${nB} | Current set: ${S.currentSet}
- Serving: ${srv} | Returning: ${rstr}
${S.deuce?'- DEUCE':''} ${S.tiebreak?'- TIE-BREAK':''} ${S.goldenPoint?'- GOLDEN POINT':''}

PADEL SCORING RULES (CRITICAL):
- NEVER say "love" or "amor". Score zero = "zero" in the spoken language.
- Announce points with server's score first.
- Deuce = "Equal" / "Égalité" / "Parità" / "Einstand" etc in the right language.
- Double fault = point for the returning team.

Respond ONLY with this exact JSON (no markdown):
{"action":"point_A|point_B|fault_A|fault_B|double_fault_A|double_fault_B|undo|new_match|end_match|chat|unknown","announce":"referee announcement in ${currentLang().name} (max 8 words, no love/amor)","reason":"internal note"}

INTERPRETATION RULES:
- serve/service/point to server → point_${S.serving}
- return/receiver/point to receiver → point_${S.serving==='A'?'B':'A'}
- advantage server → point_${S.serving}
- advantage receiver/return → point_${S.serving==='A'?'B':'A'}
- fault/net/foot/out → fault of server (${srv})
- double fault → double_fault of server, point for ${rstr}
- "${nA.toLowerCase()}" → point_A | "${nB.toLowerCase()}" → point_B
- undo/error/cancel/annul → undo
- question or conversation → chat, respond as padel referee in ${currentLang().name}
- unclear → unknown

IMPORTANT: Your 'announce' field MUST be in ${currentLang().name}. Never use Spanish if the language is not Spanish.`;
};

async function askGemini(userText){
    // Build full prompt including system + history + new message
    // Using simple single-turn approach for reliability
    const systemText = REFEREE_SYSTEM();
    const historyText = chatHistory.slice(-6).map(m=>
        (m.role==='user'?'User: ':'Referee: ') + m.parts[0].text
    ).join('\n');

    const fullPrompt = systemText + (historyText ? '\n\nCONVERSATION HISTORY:\n'+historyText : '') + '\n\nUser says: "' + userText + '"';

    const body = {
        contents: [{
            parts: [{ text: fullPrompt }]
        }],
        generationConfig: { temperature: 0.15, maxOutputTokens: 250 }
    };

    const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
        { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }
    );

    if(!res.ok){
        const e = await res.json().catch(()=>({}));
        throw new Error(e.error?.message || 'HTTP '+res.status);
    }

    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';

    // Save to history
    chatHistory.push({role:'user', parts:[{text:userText}]});
    chatHistory.push({role:'model', parts:[{text:raw}]});
    if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

    // Parse JSON — Gemini sometimes wraps in markdown
    const clean = raw.replace(/```json\s?|```/g,'').trim();
    // Find first { ... } block
    const match = clean.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('No JSON in response: '+raw.substring(0,100));
    return JSON.parse(match[0]);
}

async function testGemini(){
    if(!GEMINI_KEY){ showToast('⚠️ Pon tu API Key primero',2500); return; }
    showToast('🤖 Probando conexión...',2000);
    try{
        const result = await askGemini('Di hola como árbitro de pádel en 5 palabras máximo');
        const msg = result.announce || result.reason || '¡Conexión OK!';
        speak(msg);
        showToast('✅ Gemini OK: '+msg, 4000);
    }catch(e){
        showToast('❌ Error: '+e.message, 4000);
        console.error('Gemini test error:', e);
    }
}

function speak(text){
    if(!S.soundEnabled||!text||!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang=currentLang().voice; utt.rate=0.95; utt.pitch=1.0; utt.volume=1.0;
    const voices = window.speechSynthesis.getVoices();
    const esVoice = voices.find(v=>v.lang.startsWith('es'));
    if(esVoice) utt.voice=esVoice;
    window.speechSynthesis.speak(utt);
}

function executeAIAction(result){
    const {action, announce, reason} = result;
    const msg = announce||reason||'';
    switch(action){
        case 'point_A':        addPoint('A'); speak(msg); showToast('🎙️ '+msg,3000); break;
        case 'point_B':        addPoint('B'); speak(msg); showToast('🎙️ '+msg,3000); break;
        case 'fault_A':        addFault('A','footFault'); speak(msg||'Falta.'); showToast('🎙️ '+(msg||'Falta'),2500); break;
        case 'fault_B':        addFault('B','footFault'); speak(msg||'Falta.'); showToast('🎙️ '+(msg||'Falta'),2500); break;
        case 'double_fault_A': addFault('A','doubleFault'); speak(msg||'Doble falta.'); showToast('🎙️ '+(msg||'Doble falta'),2500); break;
        case 'double_fault_B': addFault('B','doubleFault'); speak(msg||'Doble falta.'); showToast('🎙️ '+(msg||'Doble falta'),2500); break;
        case 'undo':           undoPoint(); speak(msg||'Anulado.'); showToast('🎙️ '+i('canceled'),2000); break;
        case 'new_match':      newMatch(); break;
        case 'end_match':      endMatch(); break;
        case 'chat':           speak(msg); showToast('🤖 '+msg,4000); break;
        default:               showToast('🤖 No entendido',2500); break;
    }
}

async function processVoiceCommand(txt){
    const handled = processVoiceLocal(txt);
    if(handled) return;
    if(aiEnabled && GEMINI_KEY){
        showToast('🤖 '+i('processing'),1200);
        try{
            const result = await askGemini(txt);
            executeAIAction(result);
        }catch(e){
            console.error('Gemini:',e);
            showToast('⚠️ '+e.message,3000);
        }
    } else {
        showToast('🎙️ "'+txt+'" — no reconocido',2500);
    }
}

function processVoiceLocal(txt){
    const nA=S.teamA.name.toLowerCase(), nB=S.teamB.name.toLowerCase();
    const srv=S.serving, rstr=srv==='A'?'B':'A';
    if(['deshacer','error','anular','volver','atrás'].some(c=>txt.includes(c))){ undoPoint(); speak(i('canceled')+'.'); showToast('🎙️ '+i('canceled')); return true; }
    if(['finalizar','terminar partido','fin del partido'].some(c=>txt.includes(c))){ endMatch(); return true; }
    if(['nueva partida','nuevo partido'].some(c=>txt.includes(c))){ newMatch(); return true; }
    if(txt.includes('doble falta')){ const f=txt.includes(nB)||txt.includes(' b')?'B':txt.includes(nA)||txt.includes(' a')?'A':srv; addFault(f,'doubleFault'); speak('Doble falta.'); showToast('🎙️ Doble falta'); return true; }
    if((txt==='falta'||txt.startsWith('falta '))&&!txt.includes('doble')){ const f=txt.includes(nB)||txt.includes(' b')?'B':txt.includes(nA)||txt.includes(' a')?'A':srv; addFault(f,'footFault'); speak('Falta.'); showToast('🎙️ Falta'); return true; }
    if(txt.includes('ventaja servicio')||txt.includes('ventaja saque')){ addPoint(srv); speak('Ventaja servicio.'); return true; }
    if(txt.includes('ventaja resto')||txt.includes('ventaja receptor')){ addPoint(rstr); speak('Ventaja resto.'); return true; }
    if(['punto al saque','punto saque','al saque'].some(c=>txt.includes(c))||txt==='saque'){ addPoint(srv); speak('Punto servicio.'); return true; }
    if(['punto al resto','punto resto','al resto'].some(c=>txt.includes(c))||txt==='resto'){ addPoint(rstr); speak('Punto resto.'); return true; }
    const cmdsA=['punto equipo a','punto a','equipo a','pareja a','primero',nA].filter(Boolean);
    const cmdsB=['punto equipo b','punto b','equipo b','pareja b','segundo',nB].filter(Boolean);
    if(cmdsA.some(c=>txt===c||txt.includes(c))){ addPoint('A'); return true; }
    if(cmdsB.some(c=>txt===c||txt.includes(c))){ addPoint('B'); return true; }
    return false;
}

const StatsView=()=>{
    const totalGames=S.setsHistory.reduce((a,s)=>a+s.a+s.b,0)+S.teamA.games+S.teamB.games;
    const sA=S.setsHistory.filter(s=>s.winner==='A').length;
    const sB=S.setsHistory.filter(s=>s.winner==='B').length;
    const gA=S.setsHistory.reduce((a,s)=>a+s.a,0)+S.teamA.games;
    const gB=S.setsHistory.reduce((a,s)=>a+s.b,0)+S.teamB.games;
    const gTot=gA+gB||1;
    const pctA=Math.round(gA/gTot*100);
    const bar=(pct,isA)=>`<div style="width:${pct}%;height:6px;border-radius:3px;background:${isA?'#00fd87':'#262626'};"></div>`;
    // Momentum chart (últimos 30 puntos)
    const last30=S.momentum.slice(-30);
    const momentumHtml=last30.length?`<div class="flex gap-0.5 items-end h-8">${last30.map(m=>`<div class="flex-1 rounded-sm" style="height:${m.team==='A'?'100%':'50%'};background:${m.team==='A'?'#00fd87':'#494847'};"></div>`).join('')}</div>`:'<div class="text-[10px] text-on-surface-variant/50 text-center py-3">—</div>';

    return `
<header class="px-4 pt-5 pb-3 flex items-center gap-3 flex-shrink-0">
    <button onclick="S.currentView='home';render();" class="p-2 rounded-xl scale-press"><span class="material-symbols-outlined text-on-surface-variant text-[20px]">arrow_back</span></button>
    <span class="text-on-surface font-bold text-base">${i('stats')}</span>
    <button onclick="shareResult();" class="ml-auto p-2 rounded-xl scale-press bg-surface-container border border-outline-variant/20"><span class="material-symbols-outlined text-on-surface-variant text-[18px]">share</span></button>
</header>
<div class="flex-1 scrollable px-4 pb-4 flex flex-col gap-3">
    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">${i('match')}</div>
        <div class="grid grid-cols-3 gap-3 text-center">
            <div><div class="text-2xl font-black text-primary">${sA}</div><div class="text-[8px] text-on-surface-variant uppercase">${S.teamA.name}</div></div>
            <div><div class="text-lg font-black text-on-surface">${formatTime(S.gameTime)}</div><div class="text-[8px] text-on-surface-variant uppercase">${i('matchDuration')}</div></div>
            <div><div class="text-2xl font-black text-on-surface">${sB}</div><div class="text-[8px] text-on-surface-variant uppercase">${S.teamB.name}</div></div>
        </div>
    </div>
    ${S.setsHistory.length?`<div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">${i('set')}</div>
        ${S.setsHistory.map((s,i)=>`<div class="mb-2"><div class="flex justify-between text-[9px] text-on-surface-variant mb-1"><span>Set ${i+1}${s.tiebreak?' (TB)':''}</span><span>${s.a}-${s.b}</span></div><div class="flex gap-1">${bar(Math.round(s.a/(s.a+s.b)*100),true)}${bar(Math.round(s.b/(s.a+s.b)*100),false)}</div></div>`).join('')}
    </div>`:''}
    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">${i('dominance')}</div>
        <div class="flex justify-between text-[10px] font-bold mb-1.5"><span class="text-primary truncate max-w-[100px]">${S.teamA.name} ${pctA}%</span><span class="text-on-surface">${100-pctA}% ${S.teamB.name}</span></div>
        <div class="flex gap-1">${bar(pctA,true)}${bar(100-pctA,false)}</div>
        <div class="flex justify-between text-[9px] text-on-surface-variant mt-1.5"><span>${gA}j</span><span>${gB}j</span></div>
    </div>
    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">${i('momentum')}</div>
        <div class="flex justify-between text-[8px] text-on-surface-variant mb-1.5">
            <span class="flex items-center gap-1"><div class="w-2 h-2 rounded-sm" style="background:#00fd87"></div>${S.teamA.name}</span>
            <span class="flex items-center gap-1"><div class="w-2 h-2 rounded-sm" style="background:#494847"></div>${S.teamB.name}</span>
        </div>
        ${momentumHtml}
    </div>
    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">${i('totals')}</div>
        <div class="grid grid-cols-2 gap-2">
            ${[[i('games_played'),totalGames],[i('fault')+' A',Object.values(S.faults.A).reduce((a,b)=>a+b,0)],[i('fault')+' B',Object.values(S.faults.B).reduce((a,b)=>a+b,0)],[i('calories'),S.calories>0?S.calories+'kcal':'-']].map(([l,v])=>`<div class="bg-surface-container-high rounded-2xl p-3"><div class="text-lg font-black text-on-surface">${v}</div><div class="text-[8px] text-on-surface-variant uppercase">${l}</div></div>`).join('')}
        </div>
    </div>
    <button onclick="shareResult();" class="w-full py-3 rounded-2xl bg-surface-container border border-outline-variant/20 text-on-surface-variant text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[14px]">share</span>${i('shareResult')}
    </button>
    <button onclick="shareQR();" class="w-full py-3 rounded-2xl bg-surface-container border border-primary/20 text-primary text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[14px]">qr_code</span>${i('qr')}
    </button>
</div>
${BottomNav('stats')}`;
};

        </div>
        <div class="py-2">
            <div class="flex items-center justify-between mb-2"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-[18px] text-on-surface-variant">brightness_6</span><span class="text-sm font-bold text-on-surface">${i('brightness')}</span></div><span class="text-[10px] text-on-surface-variant">${S.brightness}%</span></div>
            <input type="range" min="20" max="100" value="${S.brightness}" class="w-full" oninput="S.brightness=parseInt(this.value);document.documentElement.style.filter='brightness('+S.brightness/100+')';saveState();">
        </div>
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">Voz + IA</div>
        <div class="text-[10px] text-on-surface-variant leading-relaxed mb-3">
            <div class="text-[9px] leading-relaxed" style="color:${tc.muted()}">${i('voiceHint')}</div>
        </div>

        <!-- Árbitro IA -->
        <div class="rounded-2xl p-3 mb-2 border" style="background:${tc.surf2()};border-color:${GEMINI_KEY?tc.primary()+'30':'rgba(255,255,255,0.06)'}">
            <div class="flex items-center gap-2 mb-2">
                <span style="font-size:16px">🤖</span>
                <span class="text-sm font-black text-on-surface">${i('referee')}</span>
                <div class="w-2 h-2 rounded-full ${GEMINI_KEY?'animate-pulse-slow':'opacity-30'}" style="background:${GEMINI_KEY?tc.primary():'#555'};margin-left:auto"></div>
            </div>

            <!-- API Key input -->
            <div class="mb-2">
                <div class="text-[9px] mb-1.5" style="color:${tc.muted()}">
                    API Key de Gemini — gratis en
                    <span style="color:${tc.primary()}">aistudio.google.com/app/apikey</span>
                </div>
                <div class="flex gap-2">
                    <input type="password" id="gemini-key-input"
                        value="${GEMINI_KEY}"
                        placeholder="AIzaSy..."
                        oninput="GEMINI_KEY=this.value.trim();localStorage.setItem('pp_gemini_key',GEMINI_KEY);render();"
                        class="flex-1 rounded-xl px-3 py-2 text-[11px] font-mono border"
                        style="background:${tc.surf()};border-color:${GEMINI_KEY?tc.primary()+'50':tc.border()};color:${tc.text()};-webkit-user-select:text;user-select:text;outline:none;">
                    <button onclick="const inp=document.getElementById('gemini-key-input');inp.type=inp.type==='password'?'text':'password';"
                        class="px-3 rounded-xl border scale-press"
                        style="background:${tc.surf()};border-color:${tc.border()};color:${tc.muted()}">
                        <span class="material-symbols-outlined text-[16px]">visibility</span>
                    </button>
                </div>
                ${GEMINI_KEY
                    ? `<div class="flex items-center gap-2 mt-1.5">
                        <div class="text-[9px] font-bold" style="color:${tc.primary()}">✓ API Key configurada</div>
                        <button onclick="testGemini();" class="ml-auto text-[9px] font-black uppercase px-2 py-1 rounded-lg scale-press border" style="border-color:${tc.primary()}40;color:${tc.primary()}">Probar IA</button>
                       </div>`
                    : `<div class="text-[9px] mt-1.5" style="color:${tc.muted()}">Sin key: la voz funciona con reglas locales básicas.</div>`
                }
            </div>

            ${GEMINI_KEY ? `
            <div class="text-[9px] leading-relaxed mb-2" style="color:${tc.muted()}">
                ${i('aiHint')}<br>
                <span style="color:${tc.primary()}">"¿Quién saca?"</span> · <span style="color:${tc.primary()}">"bola fuera"</span> · <span style="color:${tc.primary()}">"doble falta"</span>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-[9px]" style="color:${tc.muted()}">Responde en voz alta</span>
                <button onclick="aiEnabled=!aiEnabled;render();" class="scale-press">
                    <span class="material-symbols-outlined text-[24px] ${aiEnabled?'filled':''}"
                        style="color:${aiEnabled?tc.primary():'#555'}">${aiEnabled?'toggle_on':'toggle_off'}</span>
                </button>
            </div>` : ''}
        </div>

        <button onclick="toggleVoice();" class="mt-1 w-full py-3 rounded-2xl text-[11px] font-black uppercase scale-press ${S.voiceActive?'bg-error/10 border border-error/30 text-error mic-active':'bg-surface-container-high border border-outline-variant/20 text-on-surface'}">
            <span class="material-symbols-outlined text-[14px] align-middle mr-1 filled">${S.voiceActive?'mic_off':'mic'}</span>${S.voiceActive?'Desactivar árbitro':'Activar árbitro IA'}
        </button>
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">${i('share')}</div>
        <div class="flex flex-col gap-2">
            <button onclick="shareResult();" class="w-full py-3 rounded-2xl bg-surface-container-high text-on-surface text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">share</span>${i('shareResult')}</button>
            <button onclick="shareQR();" class="w-full py-3 rounded-2xl bg-surface-container-high text-on-surface text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">qr_code</span>${i('qr')}</button>
        </div>
    </div>

    <div class="flex flex-col gap-2">
        <button onclick="undoPoint();" class="w-full py-3 rounded-2xl bg-surface-container border border-outline-variant/20 text-on-surface text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">undo</span>${i('undo')} último punto</button>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="newMatch();" class="py-3 rounded-2xl bg-primary/10 border border-primary/20 text-primary text-[11px] font-black uppercase scale-press flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[14px]">add</span>${i('newMatch')} partida</button>
            <button onclick="endMatch();" class="py-3 rounded-2xl bg-surface-container border border-outline-variant/20 text-on-surface-variant text-[11px] font-black uppercase scale-press flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[14px]">flag</span>${i('end')}alizar</button>
        </div>
        <button onclick="resetMatch();" class="w-full py-3 rounded-2xl bg-error/10 border border-error/20 text-error text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">restart_alt</span>${i('reset')}</button>
    </div>
</div>
${BottomNav('settings')}`;

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
    const app=document.getElementById('app');
    app.className='watch-frame font-body';
    applyTheme(S.theme||'neon');
    switch(S.currentView){
        case 'home':     app.innerHTML=HomeView(); break;
        case 'faults':   app.innerHTML=FaultsView(); break;
        case 'stats':    app.innerHTML=StatsView(); break;
        case 'activity': app.innerHTML=ActivityView(); break;
        case 'settings': app.innerHTML=SettingsView(); break;
        default:         app.innerHTML=HomeView();
    }
    if(S.brightness!==100) document.documentElement.style.filter=`brightness(${S.brightness/100})`;
    // Spectator: disable all interactive buttons except nav
    if(SPECTATOR){
        document.querySelectorAll('button').forEach(b=>{
            const txt = b.textContent.trim();
            const isNav = b.closest('nav') || b.closest('header');
            const isOk = ['stats','historial','ajustes','marcador'].some(w=>txt.toLowerCase().includes(w));
            if(!isNav && !isOk) b.style.pointerEvents='none';
        });
    }
}

startTimer();

// ── SPLASH SCREEN ──────────────────────
function showSplash(){
    const app=document.getElementById('app');
    app.className='watch-frame';
    app.style.background='#000';
    const themeColor = (THEMES[S.theme||'neon']||THEMES.neon).primary;
    const glowColor  = (THEMES[S.theme||'neon']||THEMES.neon).primaryGlow;
    app.innerHTML=`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;gap:0;">
            <div class="splash-in" style="display:flex;flex-direction:column;align-items:center;width:100%;">
                <div style="position:relative;display:flex;align-items:center;justify-content:center;width:100%;padding:0 24px;">
                    <div style="position:absolute;width:260px;height:260px;border-radius:50%;
                        background:radial-gradient(circle,${glowColor} 0%,transparent 70%);
                        animation:splashPulse 1.8s ease infinite;pointer-events:none;"></div>
                    <img src="${LOGO_BASE64}" alt="PadelPulse Live"
                        style="width:100%;max-width:300px;height:auto;object-fit:contain;
                               image-rendering:-webkit-optimize-contrast;
                               image-rendering:crisp-edges;position:relative;z-index:1;"
                        id="splash-logo">
                </div>

                <!-- Barra de carga -->
                <div style="width:220px;margin-top:32px;">
                    <!-- Track -->
                    <div style="width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;">
                        <div id="splash-bar"
                            style="height:100%;width:0%;border-radius:4px;
                                   background:${themeColor};
                                   box-shadow:0 0 8px ${glowColor};
                                   transition:width 0.1s linear;">
                        </div>
                    </div>
                    <!-- Porcentaje -->
                    <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-family:'Lexend',sans-serif;font-size:10px;font-weight:700;
                                     color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-transform:uppercase;">
                            ${i('loading')}
                        </span>
                        <span id="splash-pct"
                            style="font-family:'Lexend',sans-serif;font-size:13px;font-weight:900;
                                   color:${themeColor};letter-spacing:0.5px;">
                            0%
                        </span>
                    </div>
                </div>
            </div>
        </div>`;

    // Animación de la barra — 3000ms totales
    // Sube rápido al inicio y se frena al final (sensación real de carga)
    const bar = document.getElementById('splash-bar');
    const pct = document.getElementById('splash-pct');
    const DURATION = 2800;
    const START = Date.now();

    function easeOut(t){ return 1 - Math.pow(1-t, 2.5); }

    const tick = setInterval(()=>{
        const elapsed = Date.now() - START;
        const t = Math.min(elapsed / DURATION, 1);
        const val = Math.round(easeOut(t) * 100);
        if(bar) bar.style.width = val + '%';
        if(pct) pct.textContent = val + '%';
        if(t >= 1) clearInterval(tick);
    }, 30);

    // Fade out
    setTimeout(()=>{
        const wrap = app.querySelector('.splash-in');
        if(wrap){ wrap.classList.remove('splash-in'); wrap.classList.add('splash-out'); }
    }, 2700);

    setTimeout(()=>{
        clearInterval(tick);
        app.style.background='';
        render();
    }, 3100);
}

showSplash();

</script>
</body>
</html>
