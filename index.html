<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PadelPulse Live</title>

<script>
if(typeof tailwind!=='undefined') tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#a4ffb9","primary-container":"#00fd87","primary-dim":"#00ed7e","on-primary":"#006532","background":"#0e0e0e","surface":"#0e0e0e","surface-container":"#1a1919","surface-container-low":"#131313","surface-container-high":"#201f1f","surface-container-highest":"#262626","surface-container-lowest":"#000000","surface-bright":"#2c2c2c","on-surface":"#ffffff","on-surface-variant":"#adaaaa","outline":"#777575","outline-variant":"#494847","tertiary":"#7ee6ff","tertiary-dim":"#00cdee","error":"#ff716c","error-dim":"#d7383b"},fontFamily:{"body":["Lexend","sans-serif"]}}}};

<style>
*{-webkit-tap-highlight-color:transparent;user-select:none;box-sizing:border-box;}
html{height:100%;touch-action:manipulation;background:#000;}
body{margin:0;padding:0;background:#000;min-height:100vh;min-height:100dvh;width:100vw;overflow-x:hidden;font-family:'Lexend',sans-serif;}

/* Mobile: full screen */
.watch-frame{
    width:100vw;min-height:100vh;min-height:100dvh;
    background:transparent;
    position:relative;
    display:flex;flex-direction:column;
}

/* Responsive: adapt fluidly without mobile frame */
@media(max-width:320px){ 
    html { font-size: 14px; }
}
@media(max-width:280px){ 
    html { font-size: 12px; }
}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.material-symbols-outlined.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
.pulse-glow{box-shadow:0 0 20px rgba(0,253,135,0.4);}
.scale-press{transition:transform 0.15s cubic-bezier(0.4,0,0.2,1), filter 0.15s;}
.scale-press:active{transform:scale(0.92); filter:brightness(0.8);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.animate-pulse-slow{animation:pulse 2s ease infinite;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes scoreFlash{0%{transform:scale(1) translateY(0);filter:brightness(1)} 30%{transform:scale(1.25) translateY(-8px);filter:brightness(1.5)} 100%{transform:scale(1) translateY(0);filter:brightness(1)}}
.score-flash{animation:scoreFlash 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
.mic-active{animation:pulse 0.8s ease infinite;box-shadow:0 0 20px rgba(255,113,108,0.5);}
.scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scrollable::-webkit-scrollbar{display:none;}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:#262626;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#00fd87;border-radius:50%;cursor:pointer;}
input[type=text]{-webkit-user-select:text;user-select:text;}
.countdown-ring{transform:rotate(-90deg);transform-origin:50% 50%;}
@keyframes timerWarn{0%,100%{opacity:1}50%{opacity:0.3}}
.timer-warn{animation:timerWarn 0.5s ease infinite;}
@keyframes splashFadeIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes splashFadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.05)}}
.splash-in{animation:splashFadeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;}
.splash-out{animation:splashFadeOut 0.4s ease forwards;}
@keyframes splashPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,253,135,0.4)}70%{box-shadow:0 0 0 20px rgba(0,253,135,0)}}
.splash-glow{animation:splashPulse 1.5s ease infinite;}
@keyframes dotAppear{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreAnnounceIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes scoreAnnounceOut{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-50%) scale(0.9)}}

/* V4 Mesh Background */
.mesh-bg { position:fixed; top:0; left:0; width:100vw; height:100vh; height:100dvh; z-index:0; overflow:hidden; pointer-events:none; background: radial-gradient(circle at 50% 50%, rgba(20,20,20,0) 0%, #000 100%); }
.blob { position:absolute; filter:blur(90px) opacity(0.35); border-radius:50%; z-index:-1; pointer-events:none; transition:background 1s ease, transform 1s ease; }
@keyframes float1 { 0%,100% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(5vw, -5vh) scale(1.1); } 66% { transform: translate(-5vw, 5vh) scale(0.9); } }
@keyframes float2 { 0%,100% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(-5vw, 5vh) scale(0.9); } 66% { transform: translate(5vw, -5vh) scale(1.1); } }
.blob-a { top:-20%; left:-10%; width:70vw; height:70vw; max-width:800px; max-height:800px; animation:float1 18s infinite ease-in-out; }
.blob-b { bottom:-20%; right:-10%; width:70vw; height:70vw; max-width:800px; max-height:800px; animation:float2 22s infinite ease-in-out; }

/* ═══ MOBILE VIEWPORT-FIT ═══ */
@media (max-width:1023px) {
  .dk-score-num,
  #score-A, #score-B { font-size:clamp(5rem,22vw,10rem) !important; line-height:1 !important; }
}

/* ═══ DESKTOP VIEWPORT-FIT ═══ */
/* Forces ALL height-consuming elements to use viewport-relative units on desktop */
@media (min-width:1024px) {
  /* Header */
  .dk-header { padding-top:1.5vh !important; padding-bottom:0.8vh !important; }
  .dk-header img { height:8vh !important; }

  /* Main content area */
  .dk-main { padding-top:1vh !important; padding-bottom:1vh !important; }

  /* Left panel glass card */
  .dk-glass-left { padding:1.5vh 1rem !important; border-radius:2rem !important; }
  .dk-glass-left .dk-stats-row { margin-bottom:1vh !important; }
  .dk-glass-left .dk-stats-label { font-size:clamp(10px,1.5vh,18px) !important; margin-bottom:0.5vh !important; }
  .dk-glass-left .dk-stats-score { font-size:clamp(24px,5vh,60px) !important; }
  .dk-glass-left .dk-stats-name { font-size:clamp(8px,1.4vh,20px) !important; }
  .dk-glass-left .dk-stats-divider { height:clamp(16px,4vh,40px) !important; }

  /* Big score display */
  .dk-score-num { font-size:clamp(6rem,25vh,18rem) !important; line-height:0.9 !important; }
  .dk-score-sep { font-size:clamp(3rem,13vh,10rem) !important; }
  .dk-score-name { font-size:clamp(10px,2.2vh,30px) !important; }
  .dk-score-label { font-size:clamp(10px,2vh,24px) !important; margin-bottom:0.5vh !important; }
  .dk-score-area { margin-bottom:1vh !important; gap:1.5vw !important; }
  .dk-score-mt { margin-top:0 !important; }

  /* Right panel glass card */
  .dk-glass-right { padding:1.5vh 1rem !important; border-radius:2rem !important; }
  .dk-btn-add { padding-top:2.5vh !important; padding-bottom:2.5vh !important; border-radius:1.5rem !important; }
  .dk-btn-add .material-symbols-outlined { font-size:clamp(18px,3.5vh,48px) !important; }
  .dk-btn-add span:last-child { font-size:clamp(10px,1.8vh,20px) !important; }
  .dk-btn-sub { padding-top:1vh !important; padding-bottom:1vh !important; }
  .dk-btn-sub .material-symbols-outlined { font-size:clamp(12px,2vh,24px) !important; }
  .dk-btn-sub span:last-child { font-size:clamp(8px,1.4vh,16px) !important; }
  .dk-btn-action { padding-top:1vh !important; padding-bottom:1vh !important; }
  .dk-btn-action .material-symbols-outlined { font-size:clamp(12px,1.8vh,20px) !important; }
  .dk-grid-add { gap:1vh !important; margin-bottom:1vh !important; }
  .dk-grid-sub { gap:0.8vh !important; margin-bottom:0.8vh !important; }
  .dk-grid-act { gap:0.8vh !important; }

  /* Footer */
  .dk-footer { padding-top:0.5vh !important; padding-bottom:0.5vh !important; }

  /* Bottom Nav */
  .dk-nav button { padding-top:0.8vh !important; padding-bottom:0.8vh !important; }
  .dk-nav .material-symbols-outlined { font-size:clamp(16px,2.5vh,28px) !important; }
  .dk-nav span:last-child { font-size:clamp(7px,1vh,11px) !important; }
}
</style>
</head>

    momentum:[]
});

let timerInterval = null, betweenInterval = null;
let recognition = null, audioCtx = null;

let SPECTATOR = false; // modo solo lectura si viene de URL compartida

function loadState(){
    // 1. Intentar cargar desde URL (modo espectador)
    try{
        const hash = window.location.hash.slice(1);
        if(hash.startsWith('pp=')){
            const decoded = JSON.parse(decodeURIComponent(atob(hash.slice(3))));
            SPECTATOR = true;
            decoded.voiceActive = false;
            decoded.timerRunning = false;
            return decoded;
        }
    }catch(e){}
    // 2. Cargar desde localStorage — merge with defaultState to ensure new fields exist
    try{
        const s=localStorage.getItem('pp_state_v3');
        if(s){
            const saved=JSON.parse(s);
            const merged=Object.assign(defaultState(), saved);
            return merged;
        }
    }catch(e){}
    return defaultState();
}

let S = loadState();

// Normalizar campos que pueden estar corruptos de versiones anteriores
if(!S.bestOf || ![1,3,5].includes(S.bestOf)) S.bestOf = 3;
if(typeof S.playingExtraSet === 'undefined') S.playingExtraSet = false;
// Resetear matchOver si está corrupto
if(S.matchOver && !S.matchWinner) S.matchOver = false;
// Si playingExtraSet=true pero matchOver=true, el tercer set no terminó bien
if(S.matchOver && S.playingExtraSet){ S.matchOver = false; S.matchWinner = null; S.playingExtraSet = false; }

if (!SPECTATOR && !sessionStorage.getItem('pp_setup_done')) {
    S.currentView = 'setup';
}

// Set default team names from current language (called after LANGS is defined)
function initTeamNames(){
    if(!S.teamA.name) S.teamA.name = i('teamA').toUpperCase();
    if(!S.teamB.name) S.teamB.name = i('teamB').toUpperCase();
}
function saveState(){ try{ localStorage.setItem('pp_state_v3',JSON.stringify(S)); }catch(e){} }

// Helper — get translation
function i(key, vars={}){
    const lang = S.lang||'es';
    const t = (LANGS[lang]||LANGS.es).t;
    let str = t[key] || LANGS.es.t[key] || key;
    Object.entries(vars).forEach(([k,v])=>{ str = str.replace('%'+k, v); });
    return str;
}
function currentLang(){ return LANGS[S.lang||'es']||LANGS.es; }
function setLang(code){
    const oldLang = S.lang||'es';
    // If team names are still the default, auto-translate them
    const oldA = (LANGS[oldLang]||LANGS.es).t.teamA.toUpperCase();
    const oldB = (LANGS[oldLang]||LANGS.es).t.teamB.toUpperCase();
    S.lang = code;
    if(!S.teamA.name || S.teamA.name===oldA) S.teamA.name = i('teamA').toUpperCase();
    if(!S.teamB.name || S.teamB.name===oldB) S.teamB.name = i('teamB').toUpperCase();
    if(recognition){ stopVoice(); }
    saveState(); render();
}

function startBetweenTimer(max=20){
    if(betweenInterval) clearInterval(betweenInterval);
    S.betweenPoints=true; S.betweenTimer=max; S.betweenMax=max;
    renderBetweenTimer();
    betweenInterval=setInterval(()=>{
        S.betweenTimer--;
        renderBetweenTimer();
        if(S.betweenTimer<=0){ clearInterval(betweenInterval); betweenInterval=null; S.betweenPoints=false; hideBetweenTimer(); if(S.soundEnabled) beep(880,0.15); }
    },1000);
}
function renderBetweenTimer(){
    const el=document.getElementById('between-timer');
    if(!el) return;
    const pct=(S.betweenTimer/S.betweenMax)*100;
    el.querySelector('#bt-num').textContent=S.betweenTimer;
    const ring=el.querySelector('.bt-ring');
    if(ring){ const r=28; const circ=2*Math.PI*r; ring.style.strokeDashoffset=circ*(1-pct/100); }
    if(S.betweenTimer<=5) el.querySelector('#bt-num').classList.add('timer-warn','text-error');
    else el.querySelector('#bt-num').classList.remove('timer-warn','text-error');
}
function hideBetweenTimer(){ const el=document.getElementById('between-timer'); if(el) el.remove(); }
function showBetweenTimerEl(max){

    const el=document.createElement('div');

}

function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function beep(f=880,d=0.08,t='sine',v=0.2){
    if(!S.soundEnabled) return;
    const c=getAudio(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.start();o.stop(c.currentTime+d);
}
function soundPoint(){ beep(660,0.07);setTimeout(()=>beep(880,0.07),80); }
function soundGame(){ [440,550,660,770].forEach((f,i)=>setTimeout(()=>beep(f,0.12),i*75)); }
function soundSet(){ [330,440,550,660,880,1100].forEach((f,i)=>setTimeout(()=>beep(f,0.15),i*80)); }
function soundMatch(){ [330,440,550,660,440,660,880].forEach((f,i)=>setTimeout(()=>beep(f,0.2),i*100)); }
function soundDeuce(){ beep(440,0.15,'square',0.1);setTimeout(()=>beep(440,0.15,'square',0.1),200); }
function soundUndo(){ beep(300,0.1); }
function soundWarning(){ beep(220,0.3,'sawtooth',0.15); }
function soundTiebreak(){ [880,660,880,1100].forEach((f,i)=>setTimeout(()=>beep(f,0.1),i*100)); }

function getScoreDisplay(){
    if(S.matchOver) return {scoreA:'FIN',scoreB:'FIN',label:null,isDeuce:false};
    // Super tie-break (a 10) — prioridad máxima
    if(S.superTiebreak){
        return {
            scoreA:String(S.tiebreakPoints.A), scoreB:String(S.tiebreakPoints.B),
            label:i('superTiebreak'), isDeuce:false, isTiebreak:true
        };
    }
    // Tie-break normal (a 7)
    if(S.tiebreak){
        return {
            scoreA:String(S.tiebreakPoints.A), scoreB:String(S.tiebreakPoints.B),
            label:i('tiebreak'), isDeuce:false, isTiebreak:true
        };
    }
    if(S.deuce){
        if(S.goldenPoint) return {scoreA:'40',scoreB:'40',label:i('goldenPoint'),isDeuce:true};
        if(S.advantage==='A') return {scoreA:'AD',scoreB:'40',label:i('advantage')+' '+S.teamA.name,isDeuce:true};
        if(S.advantage==='B') return {scoreA:'40',scoreB:'AD',label:i('advantage')+' '+S.teamB.name,isDeuce:true};
        return {scoreA:'40',scoreB:'40',label:i('deuce'),isDeuce:true};
    }
    return {scoreA:POINT_LABELS[S.teamA.points]||'0',scoreB:POINT_LABELS[S.teamB.points]||'0',label:null,isDeuce:false};
}

// LÓGICA COMPLETA
// ═══════════════════════════════════════════
function snapshot(){
    S.history.push(JSON.parse(JSON.stringify({
        teamA:S.teamA, teamB:S.teamB, setsHistory:S.setsHistory,
        currentSet:S.currentSet, serving:S.serving, deuce:S.deuce,
        advantage:S.advantage, tiebreak:S.tiebreak, superTiebreak:S.superTiebreak,
        tiebreakPoints:{...S.tiebreakPoints},
        tiebreakServing:S.tiebreakServing, tiebreakServCount:S.tiebreakServCount,
        matchOver:S.matchOver, matchWinner:S.matchWinner,
        faults:JSON.parse(JSON.stringify(S.faults)),
        goldenPoint:S.goldenPoint, bestOf:S.bestOf,
        playingExtraSet:S.playingExtraSet||false,
        momentum:S.momentum.slice(-200)
    })));
    if(S.history.length>50) S.history.shift();
}

function addPoint(team){
    if(S.matchOver) return;
    snapshot();
    flashScore(team);
    S.momentum.push({team, time:S.gameTime, set:S.currentSet, game:S.teamA.games+S.teamB.games});
    if(S.momentum.length>200) S.momentum.shift();

    // SUPERDESEMPATE (a 10, tiene prioridad)
    if(S.superTiebreak){ addSuperTiebreakPoint(team); return; }

    // TIEBREAK normal (a 7)
    if(S.tiebreak){ addTiebreakPoint(team); return; }

    const other=team==='A'?'B':'A';

    // DEUCE / VENTAJA / PUNTO ORO
    if(S.deuce){
        if(S.goldenPoint){ winGame(team); return; }
        if(S.advantage===null){ S.advantage=team; soundPoint(); render(); saveState(); return; }
        if(S.advantage===team){ winGame(team); return; }
        else{ S.advantage=null; soundDeuce(); logActivity('deuce',null); render(); saveState(); return; }
    }

    S['team'+team].points++;
    const pts=S['team'+team].points, ptsOther=S['team'+other].points;

    if(pts>=3&&ptsOther>=3){ S.deuce=true; S.advantage=null; soundDeuce(); logActivity('deuce',null); render(); saveState(); return; }
    if(pts>=4){ winGame(team); return; }
    soundPoint(); render(); saveState();
}

function addTiebreakPoint(team){
    S.tiebreakPoints[team]++;
    S.tiebreakServCount++;
    // Cambio saque: primero tras 1 punto, luego cada 2
    if(S.tiebreakServCount===1||(S.tiebreakServCount>1&&S.tiebreakServCount%2===1)){
        S.tiebreakServing=S.tiebreakServing==='A'?'B':'A';
        S.serving=S.tiebreakServing;
    }
    const pA=S.tiebreakPoints.A, pB=S.tiebreakPoints.B;
    if((pA>=7||pB>=7)&&Math.abs(pA-pB)>=2){
        const w=pA>pB?'A':'B';
        // Pasar juegos reales del set (6-6) al historial
        winSet(w, S.teamA.games, S.teamB.games, true);
    } else {
        soundPoint(); render(); saveState();
        if((pA+pB)%6===0) showToast(i('sideChange'),2000);
    }
}

function addSuperTiebreakPoint(team){
    S.tiebreakPoints[team]++;
    S.tiebreakServCount++;
    // Cambio saque: primero tras 1 punto, luego cada 2
    if(S.tiebreakServCount===1||(S.tiebreakServCount>1&&S.tiebreakServCount%2===1)){
        S.tiebreakServing=S.tiebreakServing==='A'?'B':'A';
        S.serving=S.tiebreakServing;
    }
    const pA=S.tiebreakPoints.A, pB=S.tiebreakPoints.B;
    // Ganar: 10+ puntos con diferencia de 2
    if((pA>=10||pB>=10) && Math.abs(pA-pB)>=2){
        const w=pA>pB?'A':'B';
        winSet(w, pA, pB, true); // pasar puntos del TB como marcador del set
    } else {
        soundPoint(); render(); saveState();
        // Aviso cambio de lado cada 6 puntos
        if((pA+pB)%6===0) showToast(i('sideChange'),2000);
    }
}

function winGame(team){
    soundGame();
    S['team'+team].games++;
    S.teamA.points=0; S.teamB.points=0;
    S.deuce=false; S.advantage=null;
    S.serving=S.serving==='A'?'B':'A';
    logActivity('game',team);
    S.calories=Math.round(S.gameTime/60*7.5);

    const gA=S.teamA.games, gB=S.teamB.games;

    // Tie-break a 6-6
    if(gA===6&&gB===6&&!S.superTiebreak){
        S.tiebreak=true;
        S.tiebreakPoints={A:0,B:0};
        S.tiebreakServing=S.serving;
        S.tiebreakServCount=0;
        soundTiebreak();
        showToast(i('tiebreakAlert'),3000);
        render(); saveState();
        return; // NO llamar showBetweenTimer aquí
    }

    // ¿Gana el set?
    let setWinner=null;
    if(gA>=6&&gA-gB>=2) setWinner='A';
    else if(gB>=6&&gB-gA>=2) setWinner='B';

    if(setWinner){
        winSet(setWinner,gA,gB,false);
        // winSet gestiona todo — NO llamar showBetweenTimer
    } else {
        render(); saveState();
        showBetweenTimerEl(20); startBetweenTimer(20);
    }
}

function winSet(team,gA,gB,fromTiebreak){
    soundSet();

    const setRecord = {
        a: gA, b: gB,
        winner: team,
        tiebreak: fromTiebreak||false,
        tbA: fromTiebreak ? S.tiebreakPoints.A : 0,
        tbB: fromTiebreak ? S.tiebreakPoints.B : 0
    };
    S.setsHistory.push(setRecord);
    S['team'+team].sets++;

    // Reset estado del set
    S.teamA.games=0; S.teamB.games=0;
    S.teamA.points=0; S.teamB.points=0;
    S.deuce=false; S.advantage=null;
    S.tiebreak=false; S.superTiebreak=false;
    S.tiebreakPoints={A:0,B:0};
    S.tiebreakServCount=0;
    S.serving = team==='A'?'B':'A'; // el perdedor saca el siguiente set
    S.currentSet++;
    S.playingExtraSet = false; // resetear siempre aquí
    logActivity('set',team);

    // Contar sets ganados DESPUÉS del push
    const setsA = S.setsHistory.filter(s=>s.winner==='A').length;
    const setsB = S.setsHistory.filter(s=>s.winner==='B').length;
    const totalSets = setsA + setsB; // total de sets jugados hasta ahora

    // Normalizar bestOf
    const bestOf = (S.bestOf===1||S.bestOf===3||S.bestOf===5) ? S.bestOf : 3;
    S.bestOf = bestOf;
    const setsToWin = Math.ceil(bestOf/2); // 1, 2 o 3

    // ── FORMATO 1 SET ──
    if(bestOf===1){ _endMatchNow(team); return; }

    const maxSets = bestOf; // máximo de sets posibles (1, 3 o 5)

    // ── ¿Alguien tiene los sets necesarios para ganar? ──
    if(setsA >= setsToWin || setsB >= setsToWin){

        // Si ya hemos jugado MÁS sets que los necesarios para ganar (set extra acordado)
        // → terminar siempre sin preguntar
        if(totalSets > setsToWin){
            _endMatchNow(team); return;
        }

        // Victoria dominante (0 sets del rival) en primer intento → preguntar continuar
        const loserSets = Math.min(setsA, setsB);
        if(loserSets === 0 && bestOf >= 3){
            saveState(); render();
            setTimeout(()=>showContinueModal(team, setsA, setsB), 500);
            return;
        }

        // Victoria normal (ej. 2-1) → fin
        _endMatchNow(team); return;
    }

    // ── Empate 1-1 en bestOf=3 → preguntar tercer set ──
    if(bestOf===3 && setsA===1 && setsB===1){
        saveState(); render();
        setTimeout(()=>showThirdSetModal(), 700);
        return;
    }

    // ── Continúa el partido ──
    if(S.currentSet===3 && S.goldenPoint && bestOf===3){
        S.superTiebreak=true; S.tiebreak=false;
        S.tiebreakPoints={A:0,B:0};
        S.tiebreakServing=S.serving;
        showToast(i('superAlert'),3000);
    }

    saveState();
    render();
    const _setWinner=S['team'+team]?.name||'Equipo';
    showToast('🎾 Set '+team+' — '+gA+'-'+gB,2500);
    // Popup visual de set ganado
    (()=>{
        const prev=document.getElementById('set-won-popup'); if(prev) prev.remove();
        const sp=document.createElement('div');
        sp.id='set-won-popup';
        sp.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:180;text-align:center;pointer-events:none;animation:scoreAnnounceIn 0.2s cubic-bezier(.34,1.56,.64,1) forwards';
        sp.innerHTML=`<div style="background:rgba(10,10,10,0.94);border:1.5px solid ${tc.primary()}40;border-radius:24px;padding:20px 32px;box-shadow:0 8px 48px rgba(0,0,0,0.7);min-width:200px">
            <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:${tc.primary()};margin-bottom:6px">🎾 Set ganado</div>
            <div style="font-size:40px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1">${gA}<span style="color:rgba(255,255,255,0.2);font-weight:200;margin:0 6px">–</span>${gB}</div>
            <div style="font-size:13px;font-weight:700;color:${tc.primary()};margin-top:6px">${_setWinner}</div>
        </div>`;
        document.body.appendChild(sp);
        setTimeout(()=>{if(sp.parentNode){sp.style.animation='scoreAnnounceOut 0.25s ease forwards';setTimeout(()=>sp.remove(),250);}},2500);
    })();
    showBetweenTimerEl(90); startBetweenTimer(90);
}

function _endMatchNow(team){
    S.matchOver=true;
    S.matchWinner=team;
    S.timerRunning=false;
    soundMatch();
    logActivity('match',team);
    saveMatchToHistory();
    saveState();
    render();

}

function removePoint(team){
    if(S.matchOver) return;
    snapshot();
    const t=S['team'+team];
    // Super tiebreak (prioridad sobre tiebreak normal)
    if(S.superTiebreak){
        if(S.tiebreakPoints[team]>0) S.tiebreakPoints[team]--;
        else{ showToast('No hay puntos que quitar'); S.history.pop(); return; }
    } else if(S.tiebreak){
        if(S.tiebreakPoints[team]>0) S.tiebreakPoints[team]--;
        else{ showToast('No hay puntos que quitar'); S.history.pop(); return; }
    } else if(S.deuce){
        if(S.advantage===team) S.advantage=null;
        else{ S.deuce=false; t.points=3; S['team'+(team==='A'?'B':'A')].points=3; }
    } else {
        if(t.points>0) t.points--;
        else if(t.games>0){
            t.games--; t.points=0; S['team'+(team==='A'?'B':'A')].points=0;
            S.serving=S.serving==='A'?'B':'A';
            showToast('↩ '+t.name);
        } else { showToast('No hay puntos que quitar'); S.history.pop(); return; }
    }
    soundUndo(); render(); saveState(); showToast('➖ Punto retirado a '+t.name);
}

function undoPoint(){
    if(!S.history.length){ showToast('Nada que deshacer'); return; }
    const prev=S.history.pop(); Object.assign(S,prev);
    soundUndo(); render(); saveState(); showToast('↩ Punto deshecho');
}

// Anti-bucle: ignorar audio mientras el árbitro habla
// _speakingUntil bloquea durante el habla
// _cmdLock bloquea brevemente tras cualquier comando para evitar doble disparo
let _speakingUntil = 0;
let _cmdLock = 0;
const CMD_LOCK_MS = 1800; // ms mínimos entre comandos de voz

function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ showToast('⚠️ Voz no disponible'); return; }
    if(recognition){ stopVoice(); return; }
    recognition=new SR();
    recognition.lang=currentLang().voice;
    recognition.continuous=true;
    recognition.interimResults=false;
    recognition.maxAlternatives=5;
    recognition.onresult=(e)=>{
        const now = Date.now();
        // Ignorar si el árbitro está hablando O si hay lock de comando activo
        if(now < _speakingUntil || now < _cmdLock) return;
        for(let i=e.resultIndex;i<e.results.length;i++){
            if(e.results[i].isFinal){
                // Bloquear inmediatamente antes de procesar (evita doble disparo)
                _cmdLock = now + CMD_LOCK_MS;
                _speakingUntil = now + CMD_LOCK_MS;

                let handled=false;
                for(let a=0;a<e.results[i].length&&!handled;a++){
                    const txt=e.results[i][a].transcript.toLowerCase().trim();
                    handled=processVoiceLocal(txt);
                    if(handled) break;
                }
                if(!handled){
                    const best=e.results[i][0].transcript.toLowerCase().trim();
                    processVoiceCommand(best);
                }
                break; // solo procesar el primer resultado final por ciclo
            }
        }
    };
    recognition.onerror=(e)=>{ if(e.error!=='no-speech'){ showToast('Voz: '+e.error); stopVoice(); } };
    recognition.onend=()=>{ if(S.voiceActive) try{recognition.start();}catch(e){} };
    recognition.start(); S.voiceActive=true; render(); showToast('🎙️ Escuchando...',2000);
}
function stopVoice(){ if(recognition){ try{recognition.stop();}catch(e){} recognition=null; } S.voiceActive=false; render(); }
function toggleVoice(){ if(S.voiceActive) stopVoice(); else startVoice(); }
function toggleAI(){
    if(!aiKey){
        showToast('⚠️ Configura una API Key en Ajustes → Voz + IA', 3000, true);
        return;
    }
    aiEnabled=!aiEnabled;
    render();
    showToast(aiEnabled?'🤖 Árbitro IA activado':'🤖 Árbitro IA desactivado', 2000);
}

    const ptA = S.tiebreak ? S.tiebreakPoints.A : (ptsLabels[S.teamA.points]||'0');
    const ptB = S.tiebreak ? S.tiebreakPoints.B : (ptsLabels[S.teamB.points]||'0');

    return {
        teamA: nA, teamB: nB,
        serving: srv, returning: rstr,
        pointsA: ptA, pointsB: ptB,
        gamesA: S.teamA.games, gamesB: S.teamB.games,
        setsA: sA, setsB: sB,
        currentSet: S.currentSet,
        deuce: S.deuce, tiebreak: S.tiebreak,
        advantage: S.advantage ? S['team'+S.advantage].name : null,
        goldenPoint: S.goldenPoint,
        matchOver: S.matchOver,
        scoreDisplay: `${ptA}-${ptB}`,
        gameDisplay: `${nA} ${S.teamA.games}-${S.teamB.games} ${nB}`,
        setDisplay: `${nA} ${sA}-${sB} ${nB}`
    };
}

    const lang = currentLang().name;
    return `You are the official referee of a padel match. You have TWO roles:
1. REFEREE: React to spoken commands (points, faults, score queries) and announce the result in ${lang}.
2. CONVERSATIONAL ASSISTANT: Answer any question about the match, padel rules, or general conversation.

CURRENT MATCH STATE (always up to date):
- Teams: ${m.teamA} (A) vs ${m.teamB} (B)
- Current points: ${m.pointsA} - ${m.pointsB} (${m.serving} serves, ${m.returning} returns)
- Games this set: ${m.teamA} ${m.gamesA} - ${m.gamesB} ${m.teamB}
- Sets won: ${m.teamA} ${m.setsA} - ${m.setsB} ${m.teamB} | Set: ${m.currentSet}
${m.deuce?'- STATUS: DEUCE':''}${m.advantage?'- STATUS: ADVANTAGE '+m.advantage:''}${m.tiebreak?'- STATUS: TIE-BREAK':''}${m.goldenPoint?'- MODE: GOLDEN POINT':''}

PADEL SCORING (CRITICAL):
- Points go: 0, 15, 30, 40, Deuce, Advantage, Game
- NEVER say "love" or "amor" — say "zero/cero/nulla/zéro/null/nolla/零/ゼロ/صفر"
- Announce server's score first: "Quince, treinta" = server 15, returner 30
- Deuce in ${lang} = ${lang==='Español'?'"Iguales"':lang==='Italiano'?'"Parità"':lang==='Français'?'"Égalité"':lang==='Deutsch'?'"Einstand"':lang==='Suomi'?'"Tasapeli"':'Equal/Iguales'}
- Double fault = point for the returning team (${m.returning})

RESPOND ONLY with this exact JSON (no markdown, no extra text):
{"action":"point_A|point_B|fault_A|fault_B|double_fault_A|double_fault_B|undo|new_match|end_match|chat|unknown","announce":"spoken announcement in ${lang} (max 10 words)","reason":"brief internal note"}

ACTION RULES:
- serve/saque/servicio/server/ace → point_${S.serving} (${m.serving} wins point)
- resto/return/receiver/retorno → point_${S.serving==='A'?'B':'A'} (${m.returning} wins point)
- "punto ${m.teamA.toLowerCase()}" / "gana ${m.teamA.toLowerCase()}" → point_A
- "punto ${m.teamB.toLowerCase()}" / "gana ${m.teamB.toLowerCase()}" → point_B
- ventaja saque/servidor/servicio/in/server → point_${S.serving}
- ventaja resto/receptor/out/receiver → point_${S.serving==='A'?'B':'A'}
- falta/fault/red/pie/foot/out/fuera → fault of server (${m.serving})
- doble falta/double fault → double_fault_${S.serving}, point for ${m.returning}
- deshacer/error/anula/undo/cancel → undo
- questions about score/match/rules, or general conversation → action:"chat", answer naturally in ${lang}
- "¿cómo vamos?" / "resultado?" / "¿cuánto van?" / "score?" → chat, announce current score
- unclear → unknown

ANNOUNCE FORMAT examples:
- After point: "Treinta, quince. Sirve ${m.serving}."
- After game: "Juego ${m.teamA}. ${m.gamesA+1} juegos a ${m.gamesB}."
- Score query: "Vamos ${m.pointsA} a ${m.pointsB}. Juegos: ${m.gamesA}-${m.gamesB}."
- Deuce: "Iguales."
- Advantage: "Ventaja ${m.serving}."

IMPORTANT: announce MUST be in ${lang}. History context is below if any.`;
};

function buildPrompt(userText){
    const history = chatHistory.slice(-8).map(m=>
        (m.role==='user'?'User: ':'Referee: ') + m.parts[0].text
    ).join('\n');
    return REFEREE_SYSTEM()
        + (history ? '\n\nCONVERSATION HISTORY:\n'+history : '')
        + '\n\nUser says now: "'+userText+'"';
}

function parseAIResponse(raw){
    const clean = raw.replace(/```json\s?|```/g,'').trim();
    const match = clean.match(/\{[\s\S]*?\}/);
    if(!match) throw new Error('No JSON in: '+raw.substring(0,100));
    return JSON.parse(match[0]);
}

// ── Gemini ──
async function callGemini(userText){
    const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${aiKey}`,
        { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
              contents:[{parts:[{text:buildPrompt(userText)}]}],
              generationConfig:{temperature:0.1,maxOutputTokens:300}
          }) }
    );
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||'Gemini HTTP '+res.status); }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
}

// ── OpenAI ──
async function callOpenAI(userText){
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+aiKey},
        body: JSON.stringify({
            model:'gpt-4o-mini',
            messages:[{role:'user', content:buildPrompt(userText)}],
            temperature:0.1, max_tokens:300
        })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||'OpenAI HTTP '+res.status); }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || '{}';
}

// ── Claude ──
async function callClaude(userText){
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({ model:'claude-haiku-4-5', max_tokens:300, messages:[{role:'user', content:buildPrompt(userText)}] })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||'Claude HTTP '+res.status); }
    const data = await res.json();
    return data.content?.[0]?.text || '{}';
}

// ── Router ──
async function askAI(userText){
    let raw;
    if(aiProvider==='openai')      raw = await callOpenAI(userText);
    else if(aiProvider==='claude') raw = await callClaude(userText);
    else                           raw = await callGemini(userText);

    chatHistory.push({role:'user',  parts:[{text:userText}]});
    chatHistory.push({role:'model', parts:[{text:raw}]});
    if(chatHistory.length>16) chatHistory=chatHistory.slice(-16);
    return parseAIResponse(raw);
}

function speak(text){
    if(!S.soundEnabled||!text||!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang=currentLang().voice; utt.rate=0.92; utt.pitch=1.0; utt.volume=1.0;
    const voices = window.speechSynthesis.getVoices();
    const langVoice = voices.find(v=>v.lang.startsWith(currentLang().voice.split('-')[0]));
    if(langVoice) utt.voice=langVoice;
    // Bloquear mic durante el habla estimada + 1.5s de margen post-habla
    const estimatedMs = Math.max(2000, text.length * 90);
    _speakingUntil = Date.now() + estimatedMs;
    _cmdLock = _speakingUntil;
    utt.onend = () => {
        // Tras terminar de hablar, bloquear 1.2s más por si el mic recogió el eco
        const extra = Date.now() + 1200;
        _speakingUntil = extra;
        _cmdLock = extra;
    };
    window.speechSynthesis.speak(utt);
}

function executeAIAction(result){
    const {action, announce, reason} = result;
    const msg = announce||reason||'';
    switch(action){
        case 'point_A':        addPoint('A'); if(msg){speak(msg); showToast('🎙️ '+msg,3500);} if(!S.soundEnabled) setTimeout(()=>showScoreAnnounce(msg||'',null),100); break;
        case 'point_B':        addPoint('B'); if(msg){speak(msg); showToast('🎙️ '+msg,3500);} if(!S.soundEnabled) setTimeout(()=>showScoreAnnounce(msg||'',null),100); break;
        case 'fault_A':        speak(msg||'Falta.'); showToast('🎙️ '+(msg||'Falta'),2500); setTimeout(()=>addFault('A','footFault'),50); break;
        case 'fault_B':        speak(msg||'Falta.'); showToast('🎙️ '+(msg||'Falta'),2500); setTimeout(()=>addFault('B','footFault'),50); break;
        case 'double_fault_A': speak(msg||'Doble falta.'); showToast('🎙️ '+(msg||'Doble falta'),2500); setTimeout(()=>addFault('A','doubleFault'),50); break;
        case 'double_fault_B': speak(msg||'Doble falta.'); showToast('🎙️ '+(msg||'Doble falta'),2500); setTimeout(()=>addFault('B','doubleFault'),50); break;
        case 'undo':           undoPoint(); speak(msg||'Anulado.'); showToast('🎙️ Deshecho',2000); break;
        case 'new_match':      newMatch(); break;
        case 'end_match':      endMatch(); break;
        case 'chat':           speak(msg); showToast('🤖 '+msg,5000); break;
        default:               if(msg) showToast('🤖 '+msg,3000); break;
    }
}

function processVoiceLocal(txt){
    const nA=S.teamA.name.toLowerCase().trim();
    const nB=S.teamB.name.toLowerCase().trim();
    const srv=S.serving, rstr=srv==='A'?'B':'A';
    const t=txt.toLowerCase().replace(/[-–—]/g,' ').replace(/\s+/g,' ').trim();

    // Bloquear mic inmediatamente para evitar doble disparo en cualquier comando
    _speakingUntil = Date.now() + CMD_LOCK_MS;
    _cmdLock = _speakingUntil;

    // ── DESHACER ──
    if(/\b(deshacer|error|anula|anular|volver|atrás|cancela|repetir|repite|undo|annul|annulla|annuler|rückgängig|peruuta)\b/.test(t)){
        speak('Anulado.'); showToast('↩️ Deshecho');
        setTimeout(()=>undoPoint(), 50);
        return true;
    }

    // ── FIN / NUEVA PARTIDA ──
    if(/\b(finalizar|terminar partido|fin del partido|end match|match over|fine partita|fin du match|spiel beenden|peli loppuu)\b/.test(t)){
        endMatch(); return true;
    }
    if(/\b(nueva partida|nuevo partido|nuevo juego|new match|nuovo incontro|nouveau match|neues spiel|uusi ottelu)\b/.test(t)){
        newMatch(); return true;
    }

    // ── JUEGO ──
    // "juego", "juego pareja a", "juego equipo b", "game team a"
    const gA = /\bjuego\b/.test(t)&&(
        /\b(equipo a|pareja a|primero|para a|al uno|al primero|uno)\b/.test(t)||
        (nA.length>=3&&t.includes(nA))||/\bjuego a\b/.test(t));
    const gB = /\bjuego\b/.test(t)&&(
        /\b(equipo b|pareja b|segundo|para b|al dos|al segundo|dos)\b/.test(t)||
        (nB.length>=3&&t.includes(nB))||/\bjuego b\b/.test(t));
    if(gA&&!gB){ winGame('A'); speak('Juego '+S.teamA.name+'.'); showToast('🏆 Juego '+S.teamA.name); return true; }
    if(gB&&!gA){ winGame('B'); speak('Juego '+S.teamB.name+'.'); showToast('🏆 Juego '+S.teamB.name); return true; }

    // ── SET ──
    const sA = /\bset\b/.test(t)&&(
        /\b(equipo a|pareja a|primero|para a|uno)\b/.test(t)||
        (nA.length>=3&&t.includes(nA))||/\bset a\b/.test(t));
    const sB = /\bset\b/.test(t)&&(
        /\b(equipo b|pareja b|segundo|para b|dos)\b/.test(t)||
        (nB.length>=3&&t.includes(nB))||/\bset b\b/.test(t));
    if(sA&&!sB){ winSet('A',S.teamA.games,S.teamB.games,false); speak('Set '+S.teamA.name+'.'); showToast('🏆 Set '+S.teamA.name); return true; }
    if(sB&&!sA){ winSet('B',S.teamA.games,S.teamB.games,false); speak('Set '+S.teamB.name+'.'); showToast('🏆 Set '+S.teamB.name); return true; }

    // ── DOBLE FALTA ──
    if(/\b(doble falta|double fault|doppio fallo|double faute|doppelfehler|kaksoishuti)\b/.test(t)){
        const f = (nB.length>=3&&t.includes(nB))||/\b(equipo b|pareja b|segundo|team b|ellos)\b/.test(t)?'B':
                  (nA.length>=3&&t.includes(nA))||/\b(equipo a|pareja a|primero|team a|nosotros)\b/.test(t)?'A':srv;
        // Hablar PRIMERO para bloquear el micrófono antes de que addFault procese
        speak('Doble falta.');
        showToast('🎙️ Doble falta');
        // Pequeño delay para asegurar que _speakingUntil está activo
        setTimeout(()=>addFault(f,'doubleFault'), 50);
        return true;
    }

    // ── FALTA PIE / RED ──
    if(/\b(falta de pie|foot fault|pie|falta pie|footfault|red|net|en la red|toca la red)\b/.test(t)&&!/doble/.test(t)){
        const f = (nB.length>=3&&t.includes(nB))||/\b(equipo b|pareja b|segundo)\b/.test(t)?'B':
                  (nA.length>=3&&t.includes(nA))||/\b(equipo a|pareja a|primero)\b/.test(t)?'A':srv;
        speak('Falta de pie.'); showToast('🎙️ Falta de pie');
        setTimeout(()=>addFault(f,'footFault'), 50);
        return true;
    }

    // ── FALTA SIMPLE ──
    if(/^falta$|^fault$|^fallo$/.test(t)){
        const f = (nB.length>=3&&t.includes(nB))||/\b(equipo b|pareja b|segundo)\b/.test(t)?'B':
                  (nA.length>=3&&t.includes(nA))||/\b(equipo a|pareja a|primero)\b/.test(t)?'A':srv;
        speak('Falta.'); showToast('🎙️ Falta');
        setTimeout(()=>addFault(f,'footFault'), 50);
        return true;
    }

    // ── CONSULTA MARCADOR ──
    if(/\b(cómo vamos|como vamos|resultado|marcador|cuánto van|cuanto van|quién va|quien va|qué marcador|que marcador|cuál es|cual es|dime el|score|how.*score|what.*score|punteggio|résultat|ergebnis|tulos)\b/.test(t)){
        const m=getMatchContext();
        const msg=`${m.pointsA} a ${m.pointsB}. Juegos ${m.gamesA} a ${m.gamesB}.`;
        speak(msg);
        showToast('📊 '+msg,4000);
        // Siempre mostrar visual, con o sin sonido
        setTimeout(()=>showScoreAnnounce('📊 Marcador', 'Juegos '+m.gamesA+' — '+m.gamesB), 50);
        return true;
    }

    // ── MARCADOR ESPECÍFICO ("30 iguales", "quince treinta", etc.) ──
    const scoreResult = matchScoreVoice(t);
    if(scoreResult !== null){
        const {srvPts, rstrPts, isDeuce, advSrv, advRstr} = scoreResult;
        if(S.tiebreak||S.superTiebreak){ showToast('⚠️ Tiebreak activo',2000); return true; }
        snapshot();
        if(isDeuce){
            S.teamA.points=3; S.teamB.points=3; S.deuce=true; S.advantage=null;
        } else if(advSrv){
            S.teamA.points=3; S.teamB.points=3; S.deuce=true; S.advantage=srv;
        } else if(advRstr){
            S.teamA.points=3; S.teamB.points=3; S.deuce=true; S.advantage=rstr;
        } else {
            S['team'+srv].points=srvPts;
            S['team'+rstr].points=rstrPts;
            S.deuce=(srvPts===3&&rstrPts===3); S.advantage=null;
        }
        const lab=getScoreDisplay();
        speak(lab.scoreA+' — '+lab.scoreB);
        showToast('🎙️ '+lab.scoreA+' - '+lab.scoreB);
        saveState(); render(); return true;
    }

    // ── VENTAJA SAQUE ──
    if(/\b(ventaja saque|ventaja servicio|ventaja al saque|ventaja servidor|advantage server|advantage in|ad in|vantaggio servizio)\b/.test(t)){
        if(!S.deuce){ addPoint(srv); } else { S.advantage=srv; soundPoint(); render(); saveState(); }
        speak('Ventaja '+S['team'+srv].name+'.'); return true;
    }
    // ── VENTAJA RESTO ──
    if(/\b(ventaja resto|ventaja receptor|ventaja al resto|advantage receiver|advantage out|ad out|vantaggio ricezione)\b/.test(t)){
        if(!S.deuce){ addPoint(rstr); } else { S.advantage=rstr; soundPoint(); render(); saveState(); }
        speak('Ventaja '+S['team'+rstr].name+'.'); return true;
    }

    // ── PUNTO SAQUE ──
    if(/\b(punto.*saque|punto.*servicio|al saque|saque directo|ace|ganó.*saque|gana.*saque|point.*serv|winner.*serv)\b/.test(t)||
       t==='saque'||t==='servicio'||t==='serve'){
        addPoint(srv); return true;
    }

    // ── PUNTO RESTO / BREAK ──
    if(/\b(punto.*resto|punto.*receptor|al resto|break|gana.*resto|ganó.*resto|point.*return|point.*receiver)\b/.test(t)||
       t==='resto'||t==='return'||t==='break'){
        addPoint(rstr); return true;
    }

    // ── PUNTO POR NOMBRE / EQUIPO ──
    // Frases ES: "punto a", "punto pareja a", "punto equipo b", "ganamos", "punto para nosotros"
    // Cuidado: no activar si ya lo capturó juego/set/falta arriba
    const puntoA = [
        /\b(punto equipo a|punto pareja a|punto para a|gana equipo a|gana pareja a|punto al primero|gana el primero|lo ganamos|ganamos|punto nuestro)\b/,
        /\bpunto\b.*\ba\b$/,
    ];
    const puntoB = [
        /\b(punto equipo b|punto pareja b|punto para b|gana equipo b|gana pareja b|punto al segundo|gana el segundo|punto de ellos)\b/,
        /\bpunto\b.*\bb\b$/,
    ];

    if(puntoA.some(r=>r.test(t))){ addPoint('A'); return true; }
    if(puntoB.some(r=>r.test(t))){ addPoint('B'); return true; }

    // Por nombre de equipo (mínimo 3 letras, que no sea un comando anterior)
    if(nA.length>=3&&t.includes(nA)&&!/\b(juego|set|falta|doble)\b/.test(t)){ addPoint('A'); return true; }
    if(nB.length>=3&&t.includes(nB)&&!/\b(juego|set|falta|doble)\b/.test(t)){ addPoint('B'); return true; }

    // ── PUNTO GENÉRICO (gana quien sirve) ──
    if(/^(punto|point|punto!)$/.test(t)){ addPoint(srv); return true; }

    return false;
}

// ── Parser de marcadores hablados ──
// Entiende frases como: "30 iguales", "quince treinta", "vamos 15 a 30",
// "cuarenta iguales" (=deuce), "iguales", "deuce", etc.
function matchScoreVoice(t){

    // ── Mapa de palabras → índice de punto (0=0, 1=15, 2=30, 3=40) ──
    const W = {
        // Español
        'cero':0,'nada':0,'cero a cero':0,
        'quince':1,'quinze':1,
        'treinta':2,
        'cuarenta':3,
        // Inglés
        'zero':0,'love':0,'nil':0,'oh':0,
        'fifteen':1,'15':1,
        'thirty':2,'30':2,
        'forty':3,'40':3,
        // Italiano
        'quindici':1,'trenta':2,'quaranta':3,
        // Francés
        'zéro':0,'quinze':1,'trente':2,'quarante':3,
        // Alemán
        'null':0,'fünfzehn':1,'dreißig':2,'vierzig':3,
        // Finlandés
        'nolla':0,'viisitoista':1,'kolmekymmentä':2,'neljäkymmentä':3,
        // Números escritos
        '0':0,'15':1,'30':2,'40':3,
    };

    // ── Ventaja servidor ──
    if(/ventaja servi|ventaja saque|ventaja al saque|advantage serv|advantage in|ad in|vantaggio serv|vorhand aufschlag/.test(t)){
        return {srvPts:3,rstrPts:3,isDeuce:false,advSrv:true,advRstr:false};
    }
    // ── Ventaja restador ──
    if(/ventaja rest|ventaja al rest|ventaja recept|advantage out|advantage rec|ad out|vantaggio rest/.test(t)){
        return {srvPts:3,rstrPts:3,isDeuce:false,advSrv:false,advRstr:true};
    }

    // ── "X iguales" / "X igual" → marcador igualado en X ──
    // IMPORTANTE: "30 iguales" = 30-30, "15 iguales" = 15-15
    // Solo "cuarenta iguales" / "40 iguales" = deuce
    const equalsMatch = t.match(/^(quince|15|treinta|30|cuarenta|40|cero|0)\s+(iguales?|igual|all|tous|tutti|alle|tasapeli)$/);
    if(equalsMatch){
        const v = W[equalsMatch[1].replace('quince','quince')] ?? W[equalsMatch[1]];
        if(v !== undefined){
            if(v===3) return {srvPts:3,rstrPts:3,isDeuce:true,advSrv:false,advRstr:false}; // 40 iguales = deuce
            return {srvPts:v,rstrPts:v,isDeuce:false,advSrv:false,advRstr:false};
        }
    }

    // ── "iguales" / "deuce" solo (sin número) → deuce/40-40 ──
    if(/^(deuce|iguales?|parità|égalité|einstand|tasapeli)$/.test(t)){
        return {srvPts:3,rstrPts:3,isDeuce:true,advSrv:false,advRstr:false};
    }

    // ── Quitar palabras de relleno y parsear "X a Y" / "X Y" ──
    const filler=/\b(vamos|ahora|están|van|estamos|ponemos|está|pone|es|marcador|score|it'?s|the score is|we'?re at|son|sería|pon|pon el|anota)\b/gi;
    const clean = t.replace(filler,'').replace(/\s+/g,' ').trim();
    const words = clean.split(/\s+/);

    for(let i=0;i<words.length;i++){
        const w1 = words[i];
        if(!(w1 in W)) continue;
        // Saltar conectores
        let j = i+1;
        while(j<words.length && /^(a|to|all|por|and|e|y|—|-|–|igual|iguales?|versus|vs|contra)$/.test(words[j])) j++;
        if(j>=words.length) continue;
        const w2 = words[j];
        if(w2 in W){
            const s1=W[w1], s2=W[w2];
            // 40-40 → deuce
            if(s1===3 && s2===3) return {srvPts:3,rstrPts:3,isDeuce:true,advSrv:false,advRstr:false};
            return {srvPts:s1,rstrPts:s2,isDeuce:false,advSrv:false,advRstr:false};
        }
    }
    return null;
}

// ── Calcular métricas avanzadas de un partido ──
function calcMatchStats(match){
    const tot = match.totalPoints||0;
    const pA  = match.pointsWonA||0;
    const pB  = tot - pA;
    const gA  = match.gamesA||0;
    const gB  = match.gamesB||0;
    const gTot= (gA+gB)||1;
    // Serving stats (approx: saque cada 2 juegos)
    const srvGamesA = Math.ceil(gTot/2);
    const srvGamesB = Math.floor(gTot/2);
    const fDA = match.faults?.A?.doubleFault||0;
    const fDB = match.faults?.B?.doubleFault||0;
    // % puntos ganados
    const pctA = tot>0?Math.round(pA/tot*100):50;
    const pctB = 100-pctA;
    // Breaks (juegos ganados recibiendo ≈ si gana más juegos de los que debería sirviendo)
    const breaksA = Math.max(0, gA - Math.round(gTot*0.5));
    const breaksB = Math.max(0, gB - Math.round(gTot*0.5));
    // Service hold % (approx)
    const srvHoldA = srvGamesA>0?Math.round(Math.max(0,(srvGamesA-breaksB)/srvGamesA*100)):50;
    const srvHoldB = srvGamesB>0?Math.round(Math.max(0,(srvGamesB-breaksA)/srvGamesB*100)):50;
    // Break conversion %
    const brkConvA = (breaksA+breaksB)>0?Math.round(breaksA/(breaksA+breaksB)*100):50;
    const brkConvB = 100-brkConvA;
    // Efficiency
    const effA = Math.round((pctA + srvHoldA + brkConvA)/3);
    const effB = Math.round((pctB + srvHoldB + brkConvB)/3);
    // Performance index 0-100
    const idx = match.winner??(match.setsA>match.setsB?'A':'B');
    const perfA = Math.min(99,Math.max(1,Math.round((pctA*0.4+srvHoldA*0.3+brkConvA*0.3))));
    const perfB = Math.min(99,Math.max(1,Math.round((pctB*0.4+srvHoldB*0.3+brkConvB*0.3))));
    return { pctA,pctB,srvHoldA,srvHoldB,brkConvA,brkConvB,effA,effB,perfA,perfB,
             breaksA,breaksB,gA,gB,pA,pB,tot,fDA,fDB };
}

// ── AI Coach post-partido ──
async function generateAICoach(match){
    const k=getAIKey(aiProvider)||aiKey;
    if(!k) return null;
    const st=calcMatchStats(match);
    const winner=match.winner==='A'?match.teamA:match.teamB;
    const prompt=`You are an expert padel coach. Analyze this match and give concise coaching advice in ${currentLang().name}.

MATCH DATA:
- ${match.teamA} vs ${match.teamB}
- Result: Sets ${match.setsA}-${match.setsB} (${match.setsHistory.map(s=>s.a+'-'+s.b).join(', ')})
- Winner: ${winner}
- Points won: ${match.teamA} ${st.pA} (${st.pctA}%) vs ${match.teamB} ${st.pB} (${st.pctB}%)
- Service hold: ${match.teamA} ${st.srvHoldA}% vs ${match.teamB} ${st.srvHoldB}%
- Break conversion: ${match.teamA} ${st.brkConvA}% vs ${match.teamB} ${st.brkConvB}%
- Duration: ${formatTime(match.duration)}

Respond ONLY with this JSON (no markdown):
{"index":${st.perfA},"summary":"2-3 sentence coaching insight for ${match.teamA}","focus":"1 sentence on what to improve next match","rating":"${st.perfA>=75?'Excellent':st.perfA>=55?'Good':st.perfA>=40?'Average':'Needs work'}"}`;

    try{
        let raw='';
        if(aiProvider==='openai'){
            const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:prompt}],temperature:0.3,max_tokens:200})});
            const d=await r.json(); raw=d.choices?.[0]?.message?.content||'{}';
        } else if(aiProvider==='claude'){
            const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5',max_tokens:200,messages:[{role:'user',content:prompt}]})});
            const d=await r.json(); raw=d.content?.[0]?.text||'{}';
        } else {
            const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${k}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.3,maxOutputTokens:200}})});
            const d=await r.json(); raw=d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
        }
        const clean=raw.replace(/```json\s?|```/g,'').trim();
        const m=clean.match(/\{[\s\S]*?\}/);
        return m?JSON.parse(m[0]):null;
    }catch(e){ return null; }
}

            if(!result){
                cont.innerHTML=`<div class="text-[10px]" style="color:${mu}">No se pudo generar el análisis. Verifica tu API Key.</div>`;
                return;
            }
            const idx=result.index||50;
            const color=idx>=70?p:idx>=50?'#f59e0b':'#e07b39';
            cont.innerHTML=`
            <div class="flex gap-3 items-start">
                <div class="flex-1">
                    <div class="text-[10px] leading-relaxed mb-2" style="color:${te}">${result.summary||''}</div>
                    ${result.focus?`<div class="text-[9px] p-2 rounded-xl mb-1" style="background:rgba(255,255,255,0.04);color:${mu}">🎯 ${result.focus}</div>`:''}
                    <div class="text-[9px] font-bold" style="color:${color}">${result.rating||''}</div>
                </div>
                <div class="flex flex-col items-center flex-shrink-0">
                    <div class="w-14 h-14 rounded-full flex items-center justify-center font-black text-xl border-2" style="border-color:${color};color:${color}">${idx}</div>
                    <div class="text-[7px] font-bold uppercase mt-1" style="color:${mu}">ÍNDICE</div>
                </div>
            </div>`;
        });
    }
}

let toastTimeout;
function showToast(msg, dur=2000, isError=false){
    let el=document.getElementById('toast');
    if(!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
    el.style.cssText=`position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
        background:${isError?'#1a0000':'#1a1919'};
        border:1px solid ${isError?'#ff716c60':'#494847'};
        color:${isError?'#ff716c':tc.primary()};
        padding:8px 16px;border-radius:12px;font-size:12px;font-weight:700;
        z-index:150;white-space:nowrap;transition:opacity 0.3s;max-width:90vw;overflow:hidden;text-overflow:ellipsis;`;
    el.textContent=msg; el.style.opacity='1';
    clearTimeout(toastTimeout); toastTimeout=setTimeout(()=>{ el.style.opacity='0'; },dur);
}

// STATS VIEW
// ═══════════════════════════════════════════
const StatsView=()=>{
    const totalPts = S.momentum.length;
    const ptsA = S.momentum.filter(m=>m.team==='A').length;
    const ptsB = totalPts - ptsA;
    const sA=S.setsHistory.filter(s=>s.winner==='A').length;
    const sB=S.setsHistory.filter(s=>s.winner==='B').length;
    const gA=S.setsHistory.reduce((a,s)=>a+s.a,0)+S.teamA.games;
    const gB=S.setsHistory.reduce((a,s)=>a+s.b,0)+S.teamB.games;
    const gTot=(gA+gB)||1;
    const pctA=totalPts>0?Math.round(ptsA/totalPts*100):50;
    const pctB=100-pctA;

    // Service hold (approx)
    const srvGamesA=Math.ceil(gTot/2), srvGamesB=Math.floor(gTot/2);
    const fDA=S.faults.A.doubleFault, fDB=S.faults.B.doubleFault;
    const breaksA=Math.max(0,gA-Math.round(gTot*0.5));
    const breaksB=Math.max(0,gB-Math.round(gTot*0.5));
    const srvHoldA=srvGamesA>0?Math.round(Math.max(0,(srvGamesA-breaksB)/srvGamesA*100)):50;
    const srvHoldB=srvGamesB>0?Math.round(Math.max(0,(srvGamesB-breaksA)/srvGamesB*100)):50;
    const brkConvA=(breaksA+breaksB)>0?Math.round(breaksA/(breaksA+breaksB)*100):50;
    const brkConvB=100-brkConvA;
    const effA=Math.round((pctA+srvHoldA+brkConvA)/3);
    const effB=Math.round((pctB+srvHoldB+brkConvB)/3);

    const p=tc.primary(), mu=tc.muted(), su=tc.surf2(), te=tc.text();

    const statRow=(label,vA,vB,higherIsBetter=true)=>{
        const numA=parseFloat(vA), numB=parseFloat(vB);
        const winA=higherIsBetter?numA>=numB:numA<=numB;
        return `<div class="flex items-center gap-2 py-2" style="border-bottom:1px solid rgba(255,255,255,0.04)">
            <span class="text-[11px] font-black w-10 text-right" style="color:${winA?p:mu}">${vA}</span>
            <div class="flex-1 flex items-center gap-1">
                <div style="flex:${numA||1};height:3px;border-radius:2px;background:${p};opacity:${winA?1:0.35}"></div>
                <span class="text-[8px] font-bold text-center px-1 flex-shrink-0" style="color:${mu};min-width:72px">${label}</span>
                <div style="flex:${numB||1};height:3px;border-radius:2px;background:#e07b39;opacity:${!winA?1:0.35}"></div>
            </div>
            <span class="text-[11px] font-black w-10" style="color:${!winA?'#e07b39':mu}">${vB}</span>
        </div>`;
    };

    // Momentum chart
    const last=S.momentum.slice(-50);
    const momentumHtml=last.length?`<div class="flex gap-px items-end" style="height:36px">${last.map(m=>`<div style="flex:1;border-radius:2px;height:${m.team==='A'?'100%':'50%'};background:${m.team==='A'?p:'#e07b39'};opacity:0.85"></div>`).join('')}</div>`:'<div class="text-[10px] text-center py-4" style="color:'+mu+'">—</div>';

    return `
<header class="px-4 pt-5 pb-3 flex items-center gap-3 flex-shrink-0 w-full max-w-4xl mx-auto">
    <button onclick="S.currentView='home';render();" class="p-2 rounded-xl scale-press"><span class="material-symbols-outlined text-on-surface-variant text-[20px]">arrow_back</span></button>
    <span class="text-on-surface font-bold text-base">${i('stats')}</span>
    <button onclick="shareResult();" class="ml-auto p-2 rounded-xl scale-press bg-surface-container border border-outline-variant/20"><span class="material-symbols-outlined text-on-surface-variant text-[18px]">share</span></button>
</header>
<div class="flex-1 scrollable px-4 pb-4 flex flex-col gap-3 w-full max-w-4xl mx-auto">

    <!-- Result header -->
    <div class="rounded-3xl p-4" style="background:${su}">
        <div class="flex items-center justify-between mb-3">
            <div class="text-center flex-1">
                <div class="font-black text-sm" style="color:${p}">${S.teamA.name}</div>
                ${(S.teamA.playerA||S.teamA.playerB)?`<div class="text-[8px]" style="color:${mu}">${[S.teamA.playerA,S.teamA.playerB].filter(Boolean).join(' / ')}</div>`:''}
            </div>
            <div class="text-center px-3">
                <div class="font-black text-2xl" style="color:${te}">${sA}<span style="color:${mu}"> – </span>${sB}</div>
                <div class="text-[9px]" style="color:${mu}">${S.setsHistory.map(s=>s.a+'-'+s.b).join(' · ')}</div>
                <div class="text-[9px] mt-1" style="color:${mu}">⏱ ${formatTime(S.gameTime)}</div>
            </div>
            <div class="text-center flex-1">
                <div class="font-black text-sm" style="color:#e07b39">${S.teamB.name}</div>
                ${(S.teamB.playerA||S.teamB.playerB)?`<div class="text-[8px]" style="color:${mu}">${[S.teamB.playerA,S.teamB.playerB].filter(Boolean).join(' / ')}</div>`:''}
            </div>
        </div>
    </div>

    <!-- Advanced stats -->
    <div class="rounded-3xl p-4" style="background:${su}">
        <div class="flex justify-between text-[10px] font-black uppercase mb-1" style="color:${mu}">
            <span style="color:${p}">${S.teamA.name}</span>
            <span>Estadísticas</span>
            <span style="color:#e07b39">${S.teamB.name}</span>
        </div>
        ${statRow('% Puntos',pctA+'%',pctB+'%')}
        ${statRow('Juegos',gA,gB)}
        ${statRow('Hold Saque',srvHoldA+'%',srvHoldB+'%')}
        ${statRow('Break Conv.',brkConvA+'%',brkConvB+'%')}
        ${statRow('Breaks',breaksA,breaksB)}
        ${statRow('Dobles Faltas',fDA,fDB,false)}
        ${statRow('Eficiencia',effA+'%',effB+'%')}
    </div>

    <!-- Momentum -->
    <div class="rounded-3xl p-4" style="background:${su}">
        <div class="text-[9px] font-bold uppercase tracking-widest mb-2" style="color:${mu}">Momentum</div>
        <div class="flex justify-between text-[8px] mb-1.5">
            <span style="color:${p}">● ${S.teamA.name} ${ptsA}pts</span>
            <span style="color:#e07b39">${ptsB}pts ${S.teamB.name} ●</span>
        </div>
        ${momentumHtml}
    </div>

    <!-- Per-set -->
    ${S.setsHistory.length?`<div class="rounded-3xl p-4" style="background:${su}">
        <div class="text-[9px] font-bold uppercase tracking-widest mb-3" style="color:${mu}">Por Set</div>
        ${S.setsHistory.map((s,idx)=>{
            const tot=(s.a+s.b)||1;
            return `<div class="mb-2">
                <div class="flex justify-between text-[9px] mb-1" style="color:${mu}">
                    <span>Set ${idx+1}${s.tiebreak?' (TB)':''}</span>
                    <span style="color:${s.winner==='A'?p:'#e07b39'}">${s.a}-${s.b}</span>
                </div>
                <div class="flex gap-1 h-1.5 rounded-full overflow-hidden">
                    <div style="width:${Math.round(s.a/tot*100)}%;background:${p};border-radius:3px"></div>
                    <div style="flex:1;background:#e07b39;opacity:0.6;border-radius:3px"></div>
                </div>
            </div>`;
        }).join('')}
    </div>`:''}

    <!-- Totals -->
    <div class="rounded-3xl p-4" style="background:${su}">
        <div class="text-[9px] font-bold uppercase tracking-widest mb-3" style="color:${mu}">Totales</div>
        <div class="grid grid-cols-2 gap-2">
            ${[[totalPts,'Puntos totales'],[formatTime(S.gameTime),'Duración'],
               [S.faults.A.doubleFault+'+'+S.faults.B.doubleFault,'Dobles faltas'],
               [S.calories>0?S.calories+'kcal':'-','Calorías']].map(([v,l])=>`
            <div class="rounded-2xl p-3" style="background:rgba(255,255,255,0.04)">
                <div class="text-base font-black" style="color:${p}">${v}</div>
                <div class="text-[8px] uppercase" style="color:${mu}">${l}</div>
            </div>`).join('')}
        </div>
    </div>

    <button onclick="shareResult();" class="w-full py-3 rounded-2xl border text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2" style="background:${su};border-color:rgba(255,255,255,0.06);color:${mu}">
        <span class="material-symbols-outlined text-[14px]">share</span>${i('shareResult')}
    </button>
</div>
${BottomNav('stats')}`;};

                style="border-color:${(S.lang||'es')===code?tc.primary():'rgba(255,255,255,0.06)'};background:${(S.lang||'es')===code?tc.primary()+'18':'transparent'}">

                <span style="font-size:9px;font-weight:700;color:${(S.lang||'es')===code?tc.primary():tc.muted()};text-transform:uppercase;">${lang.name}</span>
            </button>`).join('')}
        </div>
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">${i('partners')}</div>
        ${['A','B'].map(t=>`
        <div class="${t==='B'?'border-t border-white/5 pt-3 mt-3':''}">
            <div class="flex items-center gap-2 mb-2"><div class="w-2 h-2 rounded-full ${t==='A'?'bg-primary':'bg-outline-variant'}"></div><span class="text-[9px] font-bold ${t==='A'?'text-primary':'text-on-surface-variant'} uppercase tracking-wider">${i('team'+t)}</span></div>
            <input type="text" value="${S['team'+t].name}" maxlength="14" placeholder="${i('team'+t)}" oninput="S['team${t}'].name=this.value.toUpperCase()||'EQUIPO ${t}';saveState();" class="w-full bg-surface-container-high border border-outline-variant/30 rounded-xl px-3 py-2 text-on-surface text-sm font-bold mb-2">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" value="${S['team'+t].playerA||''}" maxlength="16" placeholder="${i('player1')}" oninput="S['team${t}'].playerA=this.value;saveState();" class="bg-surface-container-high border border-outline-variant/20 rounded-xl px-3 py-2 text-on-surface-variant text-[11px] font-bold">
                <input type="text" value="${S['team'+t].playerB||''}" maxlength="16" placeholder="${i('player2')}" oninput="S['team${t}'].playerB=this.value;saveState();" class="bg-surface-container-high border border-outline-variant/20 rounded-xl px-3 py-2 text-on-surface-variant text-[11px] font-bold">
            </div>
        </div>`).join('')}
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">${i('rules')}</div>
        ${[
            [i('goldenRule'),i('goldenSub'),'goldenPoint'],
            [i('superRule'),i('superSub'),'superTiebreak']
        ].map(([title,sub,key])=>`
        <div class="flex items-center justify-between py-2 border-b border-white/5 last:border-0">
            <div><div class="text-sm font-bold text-on-surface">${title}</div><div class="text-[9px] text-on-surface-variant">${sub}</div></div>
            <button onclick="S.${key}=!S.${key};saveState();render();" class="scale-press">
                ${`<span class="material-symbols-outlined text-[28px] ${S[key]?'text-primary filled':'text-outline'}">${S[key]?'toggle_on':'toggle_off'}</span>`}
            </button>
        </div>`).join('')}
        <div class="flex items-center justify-between pt-2">
            <div><div class="text-sm font-bold text-on-surface">${i('whoServes')}</div><div class="text-[9px] text-on-surface-variant">—</div></div>
            <div class="flex gap-2">
                ${['A','B'].map(t=>`<button onclick="S.serving='${t}';saveState();render();" class="px-3 py-1.5 rounded-xl text-[10px] font-black uppercase scale-press ${S.serving===t?'bg-primary-container text-on-primary':'bg-surface-container-high text-on-surface-variant'}">${S['team'+t].name.substring(0,3)}</button>`).join('')}
            </div>
        </div>
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">${i('audio')}</div>
        <div class="flex items-center justify-between py-2 border-b border-white/5">
            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-[18px] text-on-surface-variant filled">${S.soundEnabled?'volume_up':'volume_off'}</span><span class="text-sm font-bold text-on-surface">${i('sound')}</span></div>
            <button onclick="S.soundEnabled=!S.soundEnabled;saveState();render();" class="scale-press"><span class="material-symbols-outlined text-[28px] ${S.soundEnabled?'text-primary filled':'text-outline'}">${S.soundEnabled?'toggle_on':'toggle_off'}</span></button>
        </div>
        <div class="py-2">
            <div class="flex items-center justify-between mb-2"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-[18px] text-on-surface-variant">brightness_6</span><span class="text-sm font-bold text-on-surface">${i('brightness')}</span></div><span class="text-[10px] text-on-surface-variant">${S.brightness}%</span></div>
            <input type="range" min="20" max="100" value="${S.brightness}" class="w-full" oninput="S.brightness=parseInt(this.value);document.documentElement.style.filter='brightness('+S.brightness/100+')';saveState();">
        </div>
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="flex items-center justify-between mb-2">
            <span class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest">Voz + IA</span>
            <span class="bg-gradient-to-r from-primary to-[#00b3ff] text-black px-2 py-0.5 rounded-sm text-[8px] font-black uppercase tracking-widest shadow-lg pulse-glow object-contain">✨ PREMIUM FEATURE</span>
        </div>
        <div class="text-[10px] text-on-surface-variant leading-relaxed mb-3">
            <div class="text-[9px] leading-relaxed" style="color:${tc.muted()}">${i('voiceHint')}</div>
        </div>

        <!-- Árbitro IA Multi-proveedor -->
        <div class="rounded-2xl p-3 mb-2 border" style="background:${tc.surf2()};border-color:${aiKey?tc.primary()+'30':'rgba(255,255,255,0.06)'}">
            <div class="flex items-center gap-2 mb-3">
                <span style="font-size:16px">🤖</span>
                <span class="text-sm font-black" style="color:${tc.text()}">${i('referee')}</span>
                <div class="w-2 h-2 rounded-full ml-auto ${aiKey?'animate-pulse-slow':'opacity-20'}" style="background:${aiKey?tc.primary():'#555'}"></div>
            </div>

            <!-- Selector de proveedor -->
            <div class="grid grid-cols-3 gap-1.5 mb-3">
                ${Object.entries(AI_PROVIDERS).map(([id,p])=>`
                <button onclick="setAIProvider('${id}');"
                    class="flex flex-col items-center py-2 rounded-xl border scale-press"
                    style="background:${aiProvider===id?tc.primary()+'18':'transparent'};border-color:${aiProvider===id?tc.primary():'rgba(255,255,255,0.06)'}">
                    <span style="font-size:16px">${p.emoji}</span>
                    <span style="font-size:9px;font-weight:700;color:${aiProvider===id?tc.primary():tc.muted()};text-transform:uppercase;">${p.name}</span>
                    <span style="font-size:7px;color:${tc.muted()}">${p.free}</span>
                </button>`).join('')}
            </div>

            <!-- API Key del proveedor activo -->
            <div class="mb-2">
                <div class="text-[9px] mb-1.5" style="color:${tc.muted()}">
                    ${AI_PROVIDERS[aiProvider].name} API Key —
                    <span style="color:${tc.primary()}">${AI_PROVIDERS[aiProvider].hint}</span>
                </div>
                <div class="flex gap-2">
                    <input type="password" id="ai-key-input"
                        value="${aiKey}"
                        placeholder="${AI_PROVIDERS[aiProvider].placeholder}"
                        oninput="setAIKey('${aiProvider}',this.value.trim());aiKey=this.value.trim();render();"
                        class="flex-1 rounded-xl px-3 py-2 text-[11px] font-mono border"
                        style="background:${tc.surf()};border-color:${aiKey?tc.primary()+'50':tc.border()};color:${tc.text()};-webkit-user-select:text;user-select:text;outline:none;">
                    <button onclick="const inp=document.getElementById('ai-key-input');inp.type=inp.type==='password'?'text':'password';"
                        class="px-3 rounded-xl border scale-press"
                        style="background:${tc.surf()};border-color:${tc.border()};color:${tc.muted()}">
                        <span class="material-symbols-outlined text-[16px]">visibility</span>
                    </button>
                </div>
                ${aiKey
                    ? `<div class="flex items-center gap-2 mt-1.5">
                        <div class="text-[9px] font-bold" style="color:${tc.primary()}">✓ ${AI_PROVIDERS[aiProvider].name} listo</div>
                        <button onclick="testAI();" class="ml-auto text-[9px] font-black uppercase px-2 py-1 rounded-lg scale-press border" style="border-color:${tc.primary()}40;color:${tc.primary()}">Probar</button>
                       </div>`
                    : `<div class="text-[9px] mt-1.5" style="color:${tc.muted()}">Sin key: voz con reglas locales básicas.</div>`
                }
            </div>

            ${aiKey ? `
            <div class="flex items-center justify-between pt-2" style="border-top:1px solid rgba(255,255,255,0.05)">
                <span class="text-[9px]" style="color:${tc.muted()}">${i('aiHint')}</span>
                <button onclick="aiEnabled=!aiEnabled;render();" class="scale-press">
                    <span class="material-symbols-outlined text-[24px] ${aiEnabled?'filled':''}"
                        style="color:${aiEnabled?tc.primary():'#555'}">${aiEnabled?'toggle_on':'toggle_off'}</span>
                </button>
            </div>` : ''}
        </div>

        <button onclick="toggleVoice();" class="mt-1 w-full py-3 rounded-2xl text-[11px] font-black uppercase scale-press ${S.voiceActive?'bg-error/10 border border-error/30 text-error mic-active':'bg-surface-container-high border border-outline-variant/20 text-on-surface'}">
            <span class="material-symbols-outlined text-[14px] align-middle mr-1 filled">${S.voiceActive?'mic_off':'mic'}</span>${S.voiceActive?i('voiceOff'):i('voiceOn')}
        </button>
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">${i('share')}</div>
        <div class="flex flex-col gap-2">
            <button onclick="shareResult();" class="w-full py-3 rounded-2xl bg-surface-container-high text-on-surface text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">share</span>${i('shareResult')}</button>
            <button onclick="shareQR();" class="w-full py-3 rounded-2xl bg-surface-container-high text-on-surface text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">qr_code</span>${i('qr')}</button>
        </div>
    </div>

    <div class="flex flex-col gap-2">
        <button onclick="undoPoint();" class="w-full py-3 rounded-2xl bg-surface-container border border-outline-variant/20 text-on-surface text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">undo</span>${i('undo')} último punto</button>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="newMatch();" class="py-3 rounded-2xl bg-primary/10 border border-primary/20 text-primary text-[11px] font-black uppercase scale-press flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[14px]">add</span>${i('newMatch')} partida</button>
            <button onclick="endMatch();" class="py-3 rounded-2xl bg-surface-container border border-outline-variant/20 text-on-surface-variant text-[11px] font-black uppercase scale-press flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[14px]">flag</span>${i('end')}alizar</button>
        </div>
        <button onclick="resetMatch();" class="w-full py-3 rounded-2xl bg-error/10 border border-error/20 text-error text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">restart_alt</span>${i('reset')}</button>
    </div>
</div>
${BottomNav('settings')}`;

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
let _lastView = null;
function render(){
    const app=document.getElementById('app');
    const scrollEl = app.querySelector('.scrollable');
    const saveScroll = (scrollEl && _lastView === S.currentView) ? scrollEl.scrollTop : 0;

    app.className='watch-frame font-body';
    applyTheme(S.theme||'neon');
    const ba = document.getElementById('blob-a');
    const bb = document.getElementById('blob-b');
    if(ba) ba.style.background = S.serving==='A' ? tc.sa() : tc.si();
    if(bb) bb.style.background = S.serving==='B' ? tc.sa() : tc.si();
    switch(S.currentView){
        case 'setup':    app.innerHTML=SetupView(); break;
        case 'home':     app.innerHTML=HomeView(); break;
        case 'faults':   app.innerHTML=FaultsView(); break;
        case 'stats':    app.innerHTML=StatsView(); break;
        case 'history':  app.innerHTML=HistoryView(); break;
        case 'activity': app.innerHTML=ActivityView(); break;
        case 'settings': app.innerHTML=SettingsView(); break;
        default:         app.innerHTML=HomeView();
    }
    
    _lastView = S.currentView;
    const newScroll = app.querySelector('.scrollable');
    if(newScroll && saveScroll > 0) newScroll.scrollTop = saveScroll;

    if(S.brightness!==100) document.documentElement.style.filter=`brightness(${S.brightness/100})`;
    // Spectator: disable all interactive buttons except nav
    if(SPECTATOR){
        document.querySelectorAll('button').forEach(b=>{
            const txt = b.textContent.trim();
            const isNav = b.closest('nav') || b.closest('header');
            const isOk = ['stats','historial','ajustes','marcador'].some(w=>txt.toLowerCase().includes(w));
            if(!isNav && !isOk) b.style.pointerEvents='none';
        });
    }
}

startTimer();

// ── SPLASH SCREEN ──────────────────────
function showSplash(){
    const app=document.getElementById('app');
    app.className='watch-frame';
    app.style.background='#000';
    const themeColor = (THEMES[S.theme||'neon']||THEMES.neon).primary;
    const glowColor  = (THEMES[S.theme||'neon']||THEMES.neon).primaryGlow;
    app.innerHTML=`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;gap:0;">
            <div class="splash-in" style="display:flex;flex-direction:column;align-items:center;width:100%;">
                <div style="position:relative;display:flex;align-items:center;justify-content:center;width:100%;padding:0 24px;">
                    <div style="position:absolute;width:260px;height:260px;border-radius:50%;
                        background:radial-gradient(circle,${glowColor} 0%,transparent 70%);
                        animation:splashPulse 1.8s ease infinite;pointer-events:none;"></div>
                    <img src="${LOGO_BASE64}" alt="PadelPulse Live"
                        style="width:100%;max-width:400px;height:auto;object-fit:contain;
                               mix-blend-mode:screen;
                               image-rendering:-webkit-optimize-contrast;
                               image-rendering:crisp-edges;position:relative;z-index:1;"
                        id="splash-logo">
                </div>

                <!-- Barra de carga -->
                <div style="width:220px;margin-top:32px;">
                    <!-- Track -->
                    <div style="width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;">
                        <div id="splash-bar"
                            style="height:100%;width:0%;border-radius:4px;
                                   background:${themeColor};
                                   box-shadow:0 0 8px ${glowColor};
                                   transition:width 0.1s linear;">
                        </div>
                    </div>
                    <!-- Porcentaje -->
                    <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-family:'Lexend',sans-serif;font-size:10px;font-weight:700;
                                     color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-transform:uppercase;">
                            ${i('loading')}
                        </span>
                        <span id="splash-pct"
                            style="font-family:'Lexend',sans-serif;font-size:13px;font-weight:900;
                                   color:${themeColor};letter-spacing:0.5px;">
                            0%
                        </span>
                    </div>
                </div>
            </div>
        </div>`;

    // Animación de la barra — 3000ms totales
    // Sube rápido al inicio y se frena al final (sensación real de carga)
    const bar = document.getElementById('splash-bar');
    const pct = document.getElementById('splash-pct');
    const DURATION = 2800;
    const START = Date.now();

    function easeOut(t){ return 1 - Math.pow(1-t, 2.5); }

    const tick = setInterval(()=>{
        const elapsed = Date.now() - START;
        const t = Math.min(elapsed / DURATION, 1);
        const val = Math.round(easeOut(t) * 100);
        if(bar) bar.style.width = val + '%';
        if(pct) pct.textContent = val + '%';
        if(t >= 1) clearInterval(tick);
    }, 30);

    // Fade out
    setTimeout(()=>{
        const wrap = app.querySelector('.splash-in');
        if(wrap){ wrap.classList.remove('splash-in'); wrap.classList.add('splash-out'); }
    }, 2700);

    setTimeout(()=>{
        clearInterval(tick);
        app.style.background='';
        render();
    }, 3100);
}

// Iniciar app al cargar DOM (Tailwind no es bloqueante)
if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', showSplash);
} else {
    showSplash();
}

</script>
</body>
</html>
