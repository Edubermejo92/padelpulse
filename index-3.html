<style>
*{-webkit-tap-highlight-color:transparent;user-select:none;box-sizing:border-box;}
body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;width:100vw;overflow:hidden;font-family:'Lexend',sans-serif;}
.watch-frame{width:100vw;height:100vh;background:#0e0e0e;position:relative;overflow:hidden;display:flex;flex-direction:column;}
@media(max-width:320px){.watch-frame{border-radius:2rem;}}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.material-symbols-outlined.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
.pulse-glow{box-shadow:0 0 20px rgba(0,253,135,0.4);}
.scale-press:active{transform:scale(0.94);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.animate-pulse-slow{animation:pulse 2s ease infinite;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp 0.25s ease forwards;}
@keyframes scoreFlash{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.score-flash{animation:scoreFlash 0.3s ease;}
.mic-active{animation:pulse 0.8s ease infinite;box-shadow:0 0 20px rgba(255,113,108,0.5);}
.scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scrollable::-webkit-scrollbar{display:none;}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:#262626;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#00fd87;border-radius:50%;cursor:pointer;}
input[type=text]{-webkit-user-select:text;user-select:text;}
.countdown-ring{transform:rotate(-90deg);transform-origin:50% 50%;}
@keyframes timerWarn{0%,100%{opacity:1}50%{opacity:0.3}}
.timer-warn{animation:timerWarn 0.5s ease infinite;}
@keyframes splashFadeIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes splashFadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.05)}}
.splash-in{animation:splashFadeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;}
.splash-out{animation:splashFadeOut 0.4s ease forwards;}
@keyframes splashPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,253,135,0.4)}70%{box-shadow:0 0 0 20px rgba(0,253,135,0)}}
.splash-glow{animation:splashPulse 1.5s ease infinite;}
@keyframes dotAppear{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

function applyTheme(id){
    const t = THEMES[id] || THEMES.neon;
    const r = document.documentElement.style;
    r.setProperty('--t-bg',      t.bg);
    r.setProperty('--t-surf',    t.surface);
    r.setProperty('--t-surf2',   t.surface2);
    r.setProperty('--t-border',  t.border);
    r.setProperty('--t-text',    t.text);
    r.setProperty('--t-muted',   t.muted);
    r.setProperty('--t-primary', t.primary);
    r.setProperty('--t-glow',    t.primaryGlow);

function T(){return THEMES[S.theme||'neon']||THEMES.neon;}
// Shorthand color helpers

    bg:()=>T().bg, surf:()=>T().surface, surf2:()=>T().surface2,
    border:()=>T().border, text:()=>T().text, muted:()=>T().muted,

};
function startTimer(){
    if(timerInterval) return;
    timerInterval = setInterval(()=>{
        if(S.timerRunning && !S.matchOver){ S.gameTime++; updateFooterTime(); }
    },1000);
}
function toggleTimer(){ S.timerRunning=!S.timerRunning; render(); }
function updateFooterTime(){
    const el=document.getElementById('footer-time');
    if(el) el.textContent=formatTime(S.gameTime);
}
const formatTime=(s)=>{
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    return h>0?`${pad(h)}:${pad(m)}:${pad(sec)}`:`${pad(m)}:${pad(sec)}`;
};
const pad=n=>String(n).padStart(2,'0');

// BETWEEN POINTS TIMER
// ═══════════════════════════════════════════
function startBetweenTimer(max=20){
    if(betweenInterval) clearInterval(betweenInterval);
    S.betweenPoints=true; S.betweenTimer=max; S.betweenMax=max;
    renderBetweenTimer();
    betweenInterval=setInterval(()=>{
        S.betweenTimer--;
        renderBetweenTimer();
        if(S.betweenTimer<=0){ clearInterval(betweenInterval); betweenInterval=null; S.betweenPoints=false; hideBetweenTimer(); if(S.soundEnabled) beep(880,0.15); }
    },1000);
}
function renderBetweenTimer(){
    const el=document.getElementById('between-timer');
    if(!el) return;
    const pct=(S.betweenTimer/S.betweenMax)*100;
    el.querySelector('#bt-num').textContent=S.betweenTimer;
    const ring=el.querySelector('.bt-ring');
    if(ring){ const r=28; const circ=2*Math.PI*r; ring.style.strokeDashoffset=circ*(1-pct/100); }
    if(S.betweenTimer<=5) el.querySelector('#bt-num').classList.add('timer-warn','text-error');
    else el.querySelector('#bt-num').classList.remove('timer-warn','text-error');
}
function hideBetweenTimer(){ const el=document.getElementById('between-timer'); if(el) el.remove(); }
function showBetweenTimerEl(max){
    hideBetweenTimer();
    const el=document.createElement('div');
    el.id='between-timer';
    const r=28,circ=2*Math.PI*r;
    el.style.cssText='position:fixed;bottom:90px;right:16px;z-index:50;';
    el.innerHTML=`<div class="relative flex items-center justify-center w-16 h-16">
        <svg width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="${r}" fill="none" stroke="#262626" stroke-width="4"/>
            <circle class="bt-ring countdown-ring" cx="32" cy="32" r="${r}" fill="none" stroke="#00fd87" stroke-width="4"
                stroke-dasharray="${circ}" stroke-dashoffset="0" style="transition:stroke-dashoffset 0.9s linear;"/>
        </svg>
        <span id="bt-num" class="absolute text-on-surface font-black text-lg">${max}</span>
    </div>`;
    document.body.appendChild(el);
}

// AUDIO
// ═══════════════════════════════════════════
function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function beep(f=880,d=0.08,t='sine',v=0.2){
    if(!S.soundEnabled) return;
    const c=getAudio(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.start();o.stop(c.currentTime+d);
}
function soundPoint(){ beep(660,0.07);setTimeout(()=>beep(880,0.07),80); }
function soundGame(){ [440,550,660,770].forEach((f,i)=>setTimeout(()=>beep(f,0.12),i*75)); }
function soundSet(){ [330,440,550,660,880,1100].forEach((f,i)=>setTimeout(()=>beep(f,0.15),i*80)); }
function soundMatch(){ [330,440,550,660,440,660,880].forEach((f,i)=>setTimeout(()=>beep(f,0.2),i*100)); }
function soundDeuce(){ beep(440,0.15,'square',0.1);setTimeout(()=>beep(440,0.15,'square',0.1),200); }
function soundUndo(){ beep(300,0.1); }
function soundWarning(){ beep(220,0.3,'sawtooth',0.15); }
function soundTiebreak(){ [880,660,880,1100].forEach((f,i)=>setTimeout(()=>beep(f,0.1),i*100)); }

function getScoreDisplay(){
    if(S.matchOver) return {scoreA:'FIN',scoreB:'FIN',label:null,isDeuce:false};
    if(S.tiebreak){
        return {
            scoreA:String(S.tiebreakPoints.A), scoreB:String(S.tiebreakPoints.B),
            label:'TIE-BREAK', isDeuce:false, isTiebreak:true
        };
    }
    if(S.deuce){
        if(S.goldenPoint) return {scoreA:'40',scoreB:'40',label:'PUNTO ORO',isDeuce:true};
        if(S.advantage==='A') return {scoreA:'AD',scoreB:'40',label:'VENTAJA '+S.teamA.name,isDeuce:true};
        if(S.advantage==='B') return {scoreA:'40',scoreB:'AD',label:'VENTAJA '+S.teamB.name,isDeuce:true};
        return {scoreA:'40',scoreB:'40',label:'DEUCE',isDeuce:true};
    }
    return {scoreA:POINT_LABELS[S.teamA.points]||'0',scoreB:POINT_LABELS[S.teamB.points]||'0',label:null,isDeuce:false};
}

// ═══════════════════════════════════════════
// LÓGICA COMPLETA
// ═══════════════════════════════════════════
function snapshot(){
    S.history.push(JSON.parse(JSON.stringify({
        teamA:S.teamA, teamB:S.teamB, setsHistory:S.setsHistory,
        currentSet:S.currentSet, serving:S.serving, deuce:S.deuce,
        advantage:S.advantage, tiebreak:S.tiebreak, tiebreakPoints:{...S.tiebreakPoints},
        tiebreakServing:S.tiebreakServing, tiebreakServCount:S.tiebreakServCount,
        matchOver:S.matchOver, matchWinner:S.matchWinner, faults:JSON.parse(JSON.stringify(S.faults))
    })));
    if(S.history.length>50) S.history.shift();
}

function addPoint(team){
    if(S.matchOver) return;
    snapshot();
    flashScore(team);
    S.momentum.push({team, time:S.gameTime, set:S.currentSet, game:S.teamA.games+S.teamB.games});
    if(S.momentum.length>200) S.momentum.shift();

    // TIEBREAK
    if(S.tiebreak){ addTiebreakPoint(team); return; }

    // SUPERDESEMPATE (tercer set a 10)
    if(S.superTiebreak){ addSuperTiebreakPoint(team); return; }

    const other=team==='A'?'B':'A';

    // DEUCE / VENTAJA / PUNTO ORO
    if(S.deuce){
        if(S.goldenPoint){ winGame(team); return; }
        if(S.advantage===null){ S.advantage=team; soundPoint(); render(); saveState(); return; }
        if(S.advantage===team){ winGame(team); return; }
        else{ S.advantage=null; soundDeuce(); logActivity('deuce',null); render(); saveState(); return; }
    }

    S['team'+team].points++;
    const pts=S['team'+team].points, ptsOther=S['team'+other].points;

    if(pts>=3&&ptsOther>=3){ S.deuce=true; S.advantage=null; soundDeuce(); logActivity('deuce',null); render(); saveState(); return; }
    if(pts>=4){ winGame(team); return; }
    soundPoint(); render(); saveState();
}

function addTiebreakPoint(team){
    S.tiebreakPoints[team]++;
    S.tiebreakServCount++;
    // Saque: primero 1 punto, luego cada 2
    if(S.tiebreakServCount===1 || S.tiebreakServCount>1 && S.tiebreakServCount%2===1){
        S.tiebreakServing=S.tiebreakServing==='A'?'B':'A';
    }
    const pA=S.tiebreakPoints.A, pB=S.tiebreakPoints.B;
    // Ganar: 7+ con diferencia 2
    if((pA>=7||pB>=7)&&Math.abs(pA-pB)>=2){
        const w=pA>pB?'A':'B';
        winSet(w,S.teamA.games,S.teamB.games,true);
    } else {
        soundPoint(); render(); saveState();
        // Cambio de lado cada 6 puntos totales
        if((pA+pB)%6===0) showToast('🔄 Cambio de lado',2000);
    }
}

function addSuperTiebreakPoint(team){
    S.tiebreakPoints[team]++;
    S.tiebreakServCount++;
    if(S.tiebreakServCount===1||S.tiebreakServCount>1&&S.tiebreakServCount%2===1){
        S.tiebreakServing=S.tiebreakServing==='A'?'B':'A';
    }
    const pA=S.tiebreakPoints.A,pB=S.tiebreakPoints.B;
    if((pA>=10||pB>=10)&&Math.abs(pA-pB)>=2){
        const w=pA>pB?'A':'B';
        winSet(w,pA,pB,true);
    } else { soundPoint(); render(); saveState(); }
}

function winGame(team){
    soundGame();
    S['team'+team].games++;
    S.teamA.points=0; S.teamB.points=0;
    S.deuce=false; S.advantage=null;
    S.serving=S.serving==='A'?'B':'A';
    logActivity('game',team);
    // Estimar calorías
    S.calories=Math.round(S.gameTime/60*7.5);

    const gA=S.teamA.games, gB=S.teamB.games;
    let setWinner=null;

    // Tie-break a 6-6
    if(gA===6&&gB===6&&!S.superTiebreak){
        // Activar tie-break
        S.tiebreak=true;
        S.tiebreakPoints={A:0,B:0};
        S.tiebreakServing=S.serving;
        S.tiebreakServCount=0;
        soundTiebreak();
        showToast('🎯 ¡TIE-BREAK!',3000);
        render(); saveState(); return;
    }
    if(gA>=6&&gA-gB>=2) setWinner='A';
    else if(gB>=6&&gB-gA>=2) setWinner='B';

    if(setWinner){ winSet(setWinner,gA,gB,false); }
    else{ render(); saveState(); }
    showBetweenTimerEl(20); startBetweenTimer(20);
}

function winSet(team,gA,gB,fromTiebreak){
    soundSet();
    S['team'+team].sets++;
    S.setsHistory.push({a:gA,b:gB,winner:team,tiebreak:fromTiebreak||S.tiebreak||S.superTiebreak});
    S.teamA.games=0; S.teamB.games=0;
    S.tiebreak=false; S.superTiebreak=false;
    S.tiebreakPoints={A:0,B:0};
    S.currentSet++;
    logActivity('set',team);

    const setsA=S.setsHistory.filter(s=>s.winner==='A').length;
    const setsB=S.setsHistory.filter(s=>s.winner==='B').length;

    // Ganar partido (mejor de 3)
    if(setsA>=2||setsB>=2){
        S.matchOver=true; S.matchWinner=team; S.timerRunning=false;
        soundMatch(); logActivity('match',team);
        saveState(); render();
        setTimeout(()=>showMatchOver(team),400); return;
    }

    // Tercer set: opción superdesempate
    if(S.currentSet===3&&S.goldenPoint){
        // Activar superdesempate directamente
        S.superTiebreak=true; S.tiebreak=true;
        S.tiebreakPoints={A:0,B:0}; S.tiebreakServing=S.serving;
        showToast('⚡ SUPERDESEMPATE — primero a 10',3000);
    }

    render(); saveState();
    showToast(`🏆 Set para ${S['team'+team].name} (${gA}-${gB})`,3000);
    showBetweenTimerEl(90); startBetweenTimer(90);
}

function removePoint(team){
    if(S.matchOver) return;
    snapshot();
    const t=S['team'+team];
    if(S.tiebreak){
        if(S.tiebreakPoints[team]>0) S.tiebreakPoints[team]--;
        else{ showToast('No hay puntos que quitar'); S.history.pop(); return; }
    } else if(S.deuce){
        if(S.advantage===team) S.advantage=null;
        else{ S.deuce=false; t.points=3; S['team'+(team==='A'?'B':'A')].points=3; }
    } else {
        if(t.points>0) t.points--;
        else if(t.games>0){
            t.games--; t.points=0; S['team'+(team==='A'?'B':'A')].points=0;
            S.serving=S.serving==='A'?'B':'A';
            showToast('↩ Juego retirado a '+t.name);
        } else { showToast('No hay puntos que quitar'); S.history.pop(); return; }
    }
    soundUndo(); render(); saveState(); showToast('➖ Punto retirado a '+t.name);
}

function undoPoint(){
    if(!S.history.length){ showToast('Nada que deshacer'); return; }
    const prev=S.history.pop(); Object.assign(S,prev);
    soundUndo(); render(); saveState(); showToast('↩ Punto deshecho');
}

function logActivity(type,team){
    S.activityLog.unshift({type,team,time:formatTime(S.gameTime),set:S.currentSet,score:{gA:S.teamA.games,gB:S.teamB.games}});
    if(S.activityLog.length>100) S.activityLog.pop();
}

function flashScore(team){
    setTimeout(()=>{ const el=document.getElementById('score-'+team); if(el){el.classList.add('score-flash');setTimeout(()=>el.classList.remove('score-flash'),300);} },10);
}

function addFault(team,type){
    snapshot();
    S.faults[team][type]++;
    soundWarning();
    const labels={doubleFault:'Doble falta',footFault:'Falta de pie',warning:'Advertencia'};
    logActivity('fault',team);
    showToast(`⚠️ ${labels[type]} — ${S['team'+team].name}`);

    if(type==='doubleFault'){ addPoint(team==='A'?'B':'A'); return; }
    render(); saveState();
}

function endMatch(){

        S.matchWinner=sA>=sB?'A':'B';

        setTimeout(()=>showMatchOver(S.matchWinner),300);

// VOZ
// ═══════════════════════════════════════════
function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ showToast('⚠️ Voz no disponible'); return; }
    if(recognition){ stopVoice(); return; }
    recognition=new SR(); recognition.lang='es-ES'; recognition.continuous=true; recognition.interimResults=false; recognition.maxAlternatives=3;
    recognition.onresult=(e)=>{ for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) processVoiceCommand(e.results[i][0].transcript.toLowerCase().trim()); };
    recognition.onerror=(e)=>{ if(e.error!=='no-speech'){ showToast('Voz: '+e.error); stopVoice(); } };
    recognition.onend=()=>{ if(S.voiceActive) recognition.start(); };
    recognition.start(); S.voiceActive=true; render(); showToast('🎙️ Escuchando...',2000);
}
function stopVoice(){ if(recognition){ try{recognition.stop();}catch(e){} recognition=null; } S.voiceActive=false; render(); }
function toggleVoice(){ if(S.voiceActive) stopVoice(); else startVoice(); }
function processVoiceCommand(txt){
    const nA=S.teamA.name.toLowerCase(), nB=S.teamB.name.toLowerCase();
    const srv=S.serving; // 'A' o 'B' — quién saca ahora

    // ── Deshacer ──────────────────────────────
    if(['deshacer','error','quitar','volver','atrás'].some(c=>txt.includes(c))){ undoPoint(); showToast('🎙️ Deshecho'); return; }

    // ── Gestión partido ───────────────────────
    if(['finalizar','terminar partido'].some(c=>txt.includes(c))){ endMatch(); return; }
    if(['nueva partida','nuevo partido'].some(c=>txt.includes(c))){ newMatch(); return; }

    // ── Doble falta (+ falta de pie) ──────────
    // Doble falta al saque → punto al resto
    if(txt.includes('doble falta')){
        const faulter = txt.includes(' a')||txt.includes(nA) ? 'A'
                      : txt.includes(' b')||txt.includes(nB) ? 'B'
                      : srv; // si no especifica equipo, la comete el que saca
        addFault(faulter,'doubleFault');
        showToast('🎙️ Doble falta — punto al resto');
        return;
    }
    // Falta simple (pie, red...) — solo registro, no concede punto
    if(txt==='falta'||txt.startsWith('falta ')){
        const faulter = txt.includes(' a')||txt.includes(nA) ? 'A'
                      : txt.includes(' b')||txt.includes(nB) ? 'B'
                      : srv;
        addFault(faulter,'footFault');
        showToast('🎙️ Falta registrada');
        return;
    }

    // ── Ventaja servicio / ventaja resto ──────
    // "ventaja servicio" o "ventaja saque" → punto al que sirve
    if(txt.includes('ventaja servicio')||txt.includes('ventaja saque')){
        addPoint(srv);
        showToast('🎙️ Ventaja '+S['team'+srv].name);
        return;
    }
    // "ventaja resto" → punto al que resta
    if(txt.includes('ventaja resto')){
        const rstr=srv==='A'?'B':'A';
        addPoint(rstr);
        showToast('🎙️ Ventaja '+S['team'+rstr].name);
        return;
    }

    // ── Punto al saque / punto al resto ───────
    // "punto al saque", "punto saque", "saque" solo
    if(txt.includes('punto al saque')||txt.includes('punto saque')||txt==='saque'||txt==='al saque'){
        addPoint(srv);
        showToast('🎙️ Punto saque — '+S['team'+srv].name);
        return;
    }
    // "punto al resto", "punto resto", "resto" solo
    if(txt.includes('punto al resto')||txt.includes('punto resto')||txt==='resto'||txt==='al resto'){
        const rstr=srv==='A'?'B':'A';
        addPoint(rstr);
        showToast('🎙️ Punto resto — '+S['team'+rstr].name);
        return;
    }

    // ── Punto equipo A / punto A / equipo A ───
    const cmdsA=['punto equipo a','punto a','equipo a','pareja a','primero',nA];
    const cmdsB=['punto equipo b','punto b','equipo b','pareja b','segundo',nB];
    if(cmdsA.some(c=>txt===c||txt.includes(c))){ addPoint('A'); showToast('🎙️ Punto '+S.teamA.name); return; }
    if(cmdsB.some(c=>txt===c||txt.includes(c))){ addPoint('B'); showToast('🎙️ Punto '+S.teamB.name); return; }

    showToast('🎙️ "'+txt+'" — no entendido',2500);
}

let toastTimeout;
function showToast(msg,dur=2000){
    let el=document.getElementById('toast');
    if(!el){ el=document.createElement('div'); el.id='toast'; el.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1919;border:1px solid #494847;color:#a4ffb9;padding:8px 16px;border-radius:12px;font-size:12px;font-weight:700;z-index:150;white-space:nowrap;transition:opacity 0.3s;'; document.body.appendChild(el); }
    el.textContent=msg; el.style.opacity='1';
    clearTimeout(toastTimeout); toastTimeout=setTimeout(()=>{ el.style.opacity='0'; },dur);
}

        ${S.setsHistory.map((s,i)=>`<div class="mb-2"><div class="flex justify-between text-[9px] text-on-surface-variant mb-1"><span>Set ${i+1}${s.tiebreak?' (TB)':''}</span><span>${s.a}-${s.b}</span></div><div class="flex gap-1">${bar(Math.round(s.a/(s.a+s.b)*100),true)}${bar(Math.round(s.b/(s.a+s.b)*100),false)}</div></div>`).join('')}

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">Dominio juegos</div>

        <div class="flex justify-between text-[9px] text-on-surface-variant mt-1.5"><span>${gA}j</span><span>${gB}j</span></div>
    </div>
    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">Momentum (últimos puntos)</div>
        <div class="flex justify-between text-[8px] text-on-surface-variant mb-1.5">
            <span class="flex items-center gap-1"><div class="w-2 h-2 rounded-sm" style="background:#00fd87"></div>${S.teamA.name}</span>
            <span class="flex items-center gap-1"><div class="w-2 h-2 rounded-sm" style="background:#494847"></div>${S.teamB.name}</span>
        </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">Totales</div>
        <div class="grid grid-cols-2 gap-2">
            ${[['Juegos',totalGames],['Faltas A',Object.values(S.faults.A).reduce((a,b)=>a+b,0)],['Faltas B',Object.values(S.faults.B).reduce((a,b)=>a+b,0)],['Calorías est.',S.calories>0?S.calories+'kcal':'-']].map(([l,v])=>`<div class="bg-surface-container-high rounded-2xl p-3"><div class="text-lg font-black text-on-surface">${v}</div><div class="text-[8px] text-on-surface-variant uppercase">${l}</div></div>`).join('')}

        <span class="material-symbols-outlined text-[14px]">share</span>Compartir resultado por WhatsApp
    </button>
    <button onclick="shareQR();" class="w-full py-3 rounded-2xl bg-surface-container border border-primary/20 text-primary text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2">

};

// ═══════════════════════════════════════════
// ACTIVITY VIEW
// ═══════════════════════════════════════════
const ActivityView=()=>{
    const icons={game:'military_tech',set:'emoji_events',deuce:'balance',match:'trophy',fault:'warning'};
    const colors={game:'text-primary',set:'text-tertiary',deuce:'text-error',match:'text-primary',fault:'text-error'};
    const labels={
        game:a=>`Juego → ${a.team?S['team'+a.team].name:''} (${a.score.gA}-${a.score.gB})`,
        set:a=>`Set ${a.set} → ${a.team?S['team'+a.team].name:''}`,
        deuce:a=>'Deuce',
        match:a=>`Partido → ${a.team?S['team'+a.team].name:''}`,
        fault:a=>`Falta — ${a.team?S['team'+a.team].name:''}`
    };
    return `
<header class="px-4 pt-5 pb-3 flex items-center gap-3 flex-shrink-0">
    <button onclick="S.currentView='home';render();" class="p-2 rounded-xl scale-press"><span class="material-symbols-outlined text-on-surface-variant text-[20px]">arrow_back</span></button>
    <span class="text-on-surface font-bold text-base">Historial</span>
    ${S.activityLog.length?`<button onclick="S.activityLog=[];render();" class="ml-auto text-error text-[10px] font-bold uppercase">Limpiar</button>`:''}
</header>
<div class="flex-1 scrollable px-4 pb-4">
    ${!S.activityLog.length?`<div class="text-center py-16 text-on-surface-variant/40"><span class="material-symbols-outlined text-5xl block mb-3">list_alt</span><span class="text-sm">Empieza a jugar para ver el historial</span></div>`
    :S.activityLog.map((a,i)=>`
    <div class="flex items-center gap-3 py-2.5 ${i<S.activityLog.length-1?'border-b border-white/5':''}">
        <div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-[15px] ${colors[a.type]||'text-on-surface-variant'} filled">${icons[a.type]||'circle'}</span>
        </div>
        <div class="flex-1 min-w-0">
            <div class="text-[11px] font-bold text-on-surface truncate">${(labels[a.type]||(a=>a.type))(a)}</div>
            <div class="text-[9px] text-on-surface-variant">Set ${a.set} · ${a.time}</div>
        </div>
    </div>`).join('')}
</div>
${BottomNav('activity')}`;
};

// ═══════════════════════════════════════════
// SETTINGS VIEW
// ═══════════════════════════════════════════
const SettingsView=()=>`
<header class="px-4 pt-5 pb-3 flex items-center gap-3 flex-shrink-0">

    <span class="text-on-surface font-bold text-base">Ajustes</span>
</header>
<div class="flex-1 scrollable px-4 pb-4 flex flex-col gap-3">

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">Parejas y jugadores</div>
        ${['A','B'].map(t=>`
        <div class="${t==='B'?'border-t border-white/5 pt-3 mt-3':''}">
            <div class="flex items-center gap-2 mb-2"><div class="w-2 h-2 rounded-full ${t==='A'?'bg-primary':'bg-outline-variant'}"></div><span class="text-[9px] font-bold ${t==='A'?'text-primary':'text-on-surface-variant'} uppercase tracking-wider">Pareja ${t}</span></div>
            <input type="text" value="${S['team'+t].name}" maxlength="14" placeholder="Nombre pareja ${t}" oninput="S['team${t}'].name=this.value.toUpperCase()||'EQUIPO ${t}';saveState();" class="w-full bg-surface-container-high border border-outline-variant/30 rounded-xl px-3 py-2 text-on-surface text-sm font-bold mb-2">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" value="${S['team'+t].playerA||''}" maxlength="16" placeholder="Jugador 1" oninput="S['team${t}'].playerA=this.value;saveState();" class="bg-surface-container-high border border-outline-variant/20 rounded-xl px-3 py-2 text-on-surface-variant text-[11px] font-bold">
                <input type="text" value="${S['team'+t].playerB||''}" maxlength="16" placeholder="Jugador 2" oninput="S['team${t}'].playerB=this.value;saveState();" class="bg-surface-container-high border border-outline-variant/20 rounded-xl px-3 py-2 text-on-surface-variant text-[11px] font-bold">
            </div>
        </div>`).join('')}
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">Reglas</div>
        ${[
            ['Punto de oro','En deuce: un punto decide','goldenPoint'],
            ['Superdesempate','3er set a 10 puntos en lugar de set completo','superTiebreak']
        ].map(([title,sub,key])=>`
        <div class="flex items-center justify-between py-2 border-b border-white/5 last:border-0">
            <div><div class="text-sm font-bold text-on-surface">${title}</div><div class="text-[9px] text-on-surface-variant">${sub}</div></div>
            <button onclick="S.${key}=!S.${key};saveState();render();" class="scale-press">
                ${`<span class="material-symbols-outlined text-[28px] ${S[key]?'text-primary filled':'text-outline'}">${S[key]?'toggle_on':'toggle_off'}</span>`}
            </button>
        </div>`).join('')}
        <div class="flex items-center justify-between pt-2">
            <div><div class="text-sm font-bold text-on-surface">Quién saca</div><div class="text-[9px] text-on-surface-variant">Saque inicial</div></div>
            <div class="flex gap-2">
                ${['A','B'].map(t=>`<button onclick="S.serving='${t}';saveState();render();" class="px-3 py-1.5 rounded-xl text-[10px] font-black uppercase scale-press ${S.serving===t?'bg-primary-container text-on-primary':'bg-surface-container-high text-on-surface-variant'}">${S['team'+t].name.substring(0,3)}</button>`).join('')}
            </div>
        </div>
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">Audio y pantalla</div>
        <div class="flex items-center justify-between py-2 border-b border-white/5">
            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-[18px] text-on-surface-variant filled">${S.soundEnabled?'volume_up':'volume_off'}</span><span class="text-sm font-bold text-on-surface">Sonido</span></div>
            <button onclick="S.soundEnabled=!S.soundEnabled;saveState();render();" class="scale-press"><span class="material-symbols-outlined text-[28px] ${S.soundEnabled?'text-primary filled':'text-outline'}">${S.soundEnabled?'toggle_on':'toggle_off'}</span></button>
        </div>
        <div class="py-2">
            <div class="flex items-center justify-between mb-2"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-[18px] text-on-surface-variant">brightness_6</span><span class="text-sm font-bold text-on-surface">Brillo</span></div><span class="text-[10px] text-on-surface-variant">${S.brightness}%</span></div>
            <input type="range" min="20" max="100" value="${S.brightness}" class="w-full" oninput="S.brightness=parseInt(this.value);document.documentElement.style.filter='brightness('+S.brightness/100+')';saveState();">
        </div>
    </div>

    <div class="bg-surface-container rounded-3xl p-4">
        <div class="text-[9px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">Voz</div>
        <div class="text-[10px] text-on-surface-variant leading-relaxed mb-3">
            <div class="mb-1.5"><span class="text-primary font-bold">"saque"</span> · <span class="text-primary font-bold">"resto"</span> — punto al que saca / al que resta</div>
            <div class="mb-1.5"><span class="text-primary font-bold">"punto al saque"</span> · <span class="text-primary font-bold">"punto al resto"</span></div>
            <div class="mb-1.5"><span class="text-primary font-bold">"ventaja servicio"</span> · <span class="text-primary font-bold">"ventaja resto"</span></div>
            <div class="mb-1.5"><span class="text-primary font-bold">"punto A"</span> · <span class="text-primary font-bold">"punto B"</span> · <span class="text-primary font-bold">"punto equipo A/B"</span></div>
            <div class="mb-1.5"><span class="text-primary font-bold">"falta"</span> · <span class="text-primary font-bold">"doble falta"</span> — la doble falta da punto al rival</div>
            <div><span class="text-primary font-bold">"deshacer"</span> · <span class="text-primary font-bold">"finalizar"</span> · <span class="text-primary font-bold">"nueva partida"</span></div>
        </div>
        <button onclick="toggleVoice();" class="w-full py-3 rounded-2xl text-[11px] font-black uppercase scale-press ${S.voiceActive?'bg-error/10 border border-error/30 text-error mic-active':'bg-surface-container-high border border-outline-variant/20 text-on-surface'}">
            <span class="material-symbols-outlined text-[14px] align-middle mr-1 filled">${S.voiceActive?'mic_off':'mic'}</span>${S.voiceActive?'Desactivar voz':'Activar voz'}

        </div>
    </div>

    <div class="flex flex-col gap-2">
        <button onclick="undoPoint();" class="w-full py-3 rounded-2xl bg-surface-container border border-outline-variant/20 text-on-surface text-[11px] font-black uppercase scale-press flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[14px]">undo</span>Deshacer último punto</button>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="newMatch();" class="py-3 rounded-2xl bg-primary/10 border border-primary/20 text-primary text-[11px] font-black uppercase scale-press flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[14px]">add</span>Nueva partida</button>
            <button onclick="endMatch();" class="py-3 rounded-2xl bg-surface-container border border-outline-variant/20 text-on-surface-variant text-[11px] font-black uppercase scale-press flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[14px]">flag</span>Finalizar</button>

    </div>
</div>
${BottomNav('settings')}`;

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
    const app=document.getElementById('app');
    app.className='watch-frame font-body';
    applyTheme(S.theme||'neon');
    switch(S.currentView){
        case 'home':     app.innerHTML=HomeView(); break;
        case 'faults':   app.innerHTML=FaultsView(); break;
        case 'stats':    app.innerHTML=StatsView(); break;
        case 'activity': app.innerHTML=ActivityView(); break;
        case 'settings': app.innerHTML=SettingsView(); break;
        default:         app.innerHTML=HomeView();
    }
    if(S.brightness!==100) document.documentElement.style.filter=`brightness(${S.brightness/100})`;
}

startTimer();

// ── SPLASH SCREEN ──────────────────────
function showSplash(){
    const app=document.getElementById('app');
    app.className='watch-frame';
    app.style.background='#000';
    app.innerHTML=`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;background:#000;">
            <div class="splash-in splash-glow" style="border-radius:50%;padding:4px;">
                <img src="${LOGO_BASE64}" alt="PadelPulse"
                    style="width:180px;height:180px;object-fit:contain;border-radius:24px;"
                    id="splash-logo">
            </div>
            <div style="margin-top:28px;display:flex;gap:6px;align-items:center;" id="splash-dots">
                <div style="width:6px;height:6px;border-radius:50%;background:#00fd87;animation:dotAppear 0.3s 0.8s both;"></div>
                <div style="width:6px;height:6px;border-radius:50%;background:#00fd87;opacity:0.6;animation:dotAppear 0.3s 1.0s both;"></div>
                <div style="width:6px;height:6px;border-radius:50%;background:#00fd87;opacity:0.3;animation:dotAppear 0.3s 1.2s both;"></div>
            </div>
        </div>`;

    // After 2.6s start fade out, then render app at 3s
    setTimeout(()=>{
        const logo=document.getElementById('splash-logo');
        const dots=document.getElementById('splash-dots');
        if(logo){ logo.parentElement.classList.remove('splash-in'); logo.parentElement.classList.add('splash-out'); }
        if(dots) dots.style.opacity='0';
    }, 2600);

    setTimeout(()=>{
        app.style.background='';
        render();
    }, 3000);
}

showSplash();

</script>
</body>
</html>
